<!DOCTYPE html>
<html>
<head>
  <title>Scout Admin Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>

    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    a {
      color: #999;
      text-decoration: none;
    }

    a:hover {
      color: white;
      text-decoration: underline;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 24px;
      font-size: 14px;
    }

    label {
      display: block;
      color: #aaa;
      font-size: 13px;
      margin-top: 14px;
      margin-bottom: 5px;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      background: #1c1c1c;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
    }

    input[readonly] {
      color: #aaa;
      background: #151515;
    }

    textarea {
      min-height: 220px;
      font-family: monospace;
      white-space: pre;
    }

    button {
      margin-top: 8px;
      background: #2a2a2a;
      color: white;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #333;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .panel {
      background: #181818;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 16px;
      margin-top: 18px;
    }

    .output-title {
      color: #aaa;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .upload-zone {
      margin-top: 12px;
      border: 2px dashed #444;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      color: #888;
      background: #141414;
    }

    .upload-zone.dragover {
      border-color: #71d685;
      background: #172018;
    }

    .mobile-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .hidden-file-input {
      display: none;
    }

    .hint {
      color: #888;
      font-size: 12px;
      margin-top: 8px;
      line-height: 1.4;
    }

    .warning {
      margin-top: 12px;
      background: #3b1717;
      border: 1px solid #5c2222;
      color: #ffb0b0;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .preview-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      overflow: hidden;
    }

    .preview-card.cover-selected {
      border: 2px solid #71d685;
    }

    .preview-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
      background: #222;
    }

    .heic-preview {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #222;
      color: #aaa;
      font-size: 13px;
      text-align: center;
      padding: 12px;
      box-sizing: border-box;
    }

    .preview-info {
      padding: 10px;
    }

    .preview-name {
      font-size: 12px;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .preview-meta {
      color: #888;
      font-size: 11px;
      line-height: 1.4;
    }

    .progress-wrap {
      margin-top: 8px;
      height: 8px;
      background: #222;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #71d685;
      transition: width 0.2s;
    }

    .status {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 10px;
      background: #222;
      color: #aaa;
    }

    .status.uploading {
      background: #4d3a12;
      color: #f4cb68;
    }

    .status.complete {
      background: #18351d;
      color: #71d685;
    }

    .status.error {
      background: #3b1717;
      color: #ff8f8f;
    }

    .status.heic {
      background: #1b2740;
      color: #9fc5ff;
    }

    .remove-btn {
      width: 100%;
      background: #3b1717;
      border: 1px solid #5c2222;
      color: #f07a7a;
    }

    .cover-btn {
      width: 100%;
      background: #18351d;
      border: 1px solid #2d5a33;
      color: #71d685;
    }

    .move-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .move-btn {
      flex: 1;
    }

  </style>
</head>

<body>

<a href="/scouts/">← Back to Scouts</a>

<h1>Admin Planner</h1>

<div class="subtitle">
  REAL Cloudflare R2 Upload System
</div>

<div class="panel">

  <div class="grid">

    <div>
      <label>Project Name *</label>
      <input id="projectName" placeholder="Good Fellas">
    </div>

    <div>
      <label>Location Name *</label>
      <input id="locationName" placeholder="Salerno's Restaurant">
    </div>

    <div>
      <label>Optional Folder Path (Leave blank unless authorized)</label>
      <input id="galleryPath" placeholder="goodfellas/restaurants/heroes">
    </div>

    <div>
      <label>Town / City</label>
      <input id="town" placeholder="Queens">
    </div>

    <div>
      <label>State</label>
      <input id="state" placeholder="NY">
    </div>

    <div>
      <label>Optional Tags</label>
      <input id="galleryTags" placeholder="period,mob,restaurant">
    </div>

  </div>

  <label>Scout Notes</label>

  <textarea id="notes"></textarea>

  <div class="warning" id="warningBox"></div>

</div>

<div class="panel">

  <div class="output-title">
    Auto Generated
  </div>

  <div class="grid">

    <div>
      <label>Project ID</label>
      <input id="projectId" readonly>
    </div>

    <div>
      <label>Folder Path</label>
      <input id="folderPath" readonly>
    </div>

    <div>
      <label>Gallery ID</label>
      <input id="galleryId" readonly>
    </div>

    <div>
      <label>Display Title</label>
      <input id="title" readonly>
    </div>

  </div>

</div>

<div class="panel">

  <div class="output-title">
    Upload Queue
  </div>

  <div class="upload-zone" id="uploadZone">
    Drag & Drop Scout Photos Here
    <div class="hint">
      HEIC / HEIF mobile photos supported.
      Some browsers may not preview them before upload.
    </div>
  </div>

  <div class="mobile-actions">

    <button onclick="document.getElementById('fileInput').click()">
      Choose Photos / Camera Roll
    </button>

    <button onclick="uploadAll()">
      Upload All To R2
    </button>

  </div>

  <input
    class="hidden-file-input"
    id="fileInput"
    type="file"
    multiple
    accept="image/*,.heic,.heif"
  >

  <div class="preview-grid" id="previewGrid"></div>

</div>

<div class="panel">

  <div class="output-title">
    Generated Gallery Entry
  </div>

  <div style="display:flex; gap:8px; flex-wrap:wrap;">

    <button onclick="copyJson()">
      Copy Gallery Entry
    </button>

    <button onclick="downloadJson()">
      Download Gallery Entry
    </button>

    <button onclick="copyProjectsBlock()">
      Copy Project Entry
    </button>

    <button onclick="downloadBundle()">
      Download Bundle
    </button>

  </div>

  <textarea id="jsonOutput"></textarea>

</div>

<script>

  const STORAGE_KEY =
    "scout-admin-session";

  const uploadZone =
    document.getElementById("uploadZone");

  const previewGrid =
    document.getElementById("previewGrid");

  const jsonOutput =
    document.getElementById("jsonOutput");

  const fileInput =
    document.getElementById("fileInput");

  const warningBox =
    document.getElementById("warningBox");

  let localFiles = [];

  let uploadedImages = [];

  let uploadProgress = {};

  let uploadStatus = {};

  let selectedCoverIndex = 0;

  function slugify(value) {

    return (value || "")
      .toLowerCase()
      .trim()
      .replace(/'/g, "")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  function uniqueAssetId(file, index) {

    const timestamp =
      Date.now();

    return `${slugify(file.name)}-${timestamp}-${index}`;
  }

  function displayTitleFromSlug(value) {

    return value
      .replace(/-/g, " ")
      .replace(/\b\w/g, char => char.toUpperCase());
  }

  function parseTags(value) {

    return value
      .split(",")
      .map(tag => tag.trim())
      .filter(Boolean);
  }

  function isHeicFile(file) {

    const name =
      file.name.toLowerCase();

    return (
      name.endsWith(".heic") ||
      name.endsWith(".heif") ||
      file.type === "image/heic" ||
      file.type === "image/heif"
    );
  }

  function getContentType(file) {

    if (file.type) {
      return file.type;
    }

    if (isHeicFile(file)) {
      return "image/heic";
    }

    return "application/octet-stream";
  }

  function showWarning(message) {

    warningBox.style.display = "block";

    warningBox.innerText = message;
  }

  function clearWarning() {

    warningBox.style.display = "none";

    warningBox.innerText = "";
  }

  function validateRequiredFields() {

    const projectName =
      document.getElementById("projectName").value.trim();

    const locationName =
      document.getElementById("locationName").value.trim();

    if (!projectName || !locationName) {

      showWarning(
        "Project Name and Location Name are required before uploading."
      );

      return false;
    }

    clearWarning();

    return true;
  }

  function autoGenerate() {

    const projectName =
      document.getElementById("projectName").value;

    const locationName =
      document.getElementById("locationName").value;

    const galleryPathRaw =
      document.getElementById("galleryPath").value.trim();

    const defaultPath =
      locationName
        ? `${slugify(locationName)}/heroes`
        : "";

    const activePath =
      galleryPathRaw || defaultPath;

    const pathSegments =
      activePath
      .split("/")
      .map(segment => slugify(segment))
      .filter(Boolean);

    const finalSegment =
      pathSegments[pathSegments.length - 1] || "heroes";

    document.getElementById("projectId").value =
      slugify(projectName);

    document.getElementById("folderPath").value =
      pathSegments.join("/");

    document.getElementById("galleryId").value =
      `${slugify(locationName)}-${finalSegment}`;

    document.getElementById("title").value =
      locationName
        ? `${locationName} — ${displayTitleFromSlug(finalSegment)}`
        : "";

    saveSession();

    if (uploadedImages.length > 0) {
      generateJson();
    }
  }

  function saveSession() {

    const data = {

      projectName:
        document.getElementById("projectName").value,

      locationName:
        document.getElementById("locationName").value,

      galleryPath:
        document.getElementById("galleryPath").value,

      town:
        document.getElementById("town").value,

      state:
        document.getElementById("state").value,

      galleryTags:
        document.getElementById("galleryTags").value,

      notes:
        document.getElementById("notes").value
    };

    localStorage.setItem(
      STORAGE_KEY,
      JSON.stringify(data)
    );
  }

  function loadSession() {

    const saved =
      localStorage.getItem(STORAGE_KEY);

    if (!saved) return;

    try {

      const data =
        JSON.parse(saved);

      Object.entries(data).forEach(([key, value]) => {

        const element =
          document.getElementById(key);

        if (element) {
          element.value = value;
        }
      });

      autoGenerate();

    } catch (error) {

      console.error(error);
    }
  }

  function addFiles(files) {

    const incoming =
      [...files]
      .filter(file =>
        file.type.startsWith("image/") ||
        isHeicFile(file)
      );

    localFiles =
      [
        ...localFiles,
        ...incoming
      ];

    uploadedImages = [];

    uploadProgress = {};

    uploadStatus = {};

    selectedCoverIndex = 0;

    renderPreviews();

    autoGenerate();
  }

  [
    "projectName",
    "locationName",
    "galleryPath",
    "town",
    "state",
    "galleryTags",
    "notes"
  ].forEach(id => {

    document
      .getElementById(id)
      .addEventListener("input", autoGenerate);
  });

  uploadZone.addEventListener("dragover", event => {

    event.preventDefault();

    uploadZone.classList.add("dragover");
  });

  uploadZone.addEventListener("dragleave", () => {

    uploadZone.classList.remove("dragover");
  });

  uploadZone.addEventListener("drop", event => {

    event.preventDefault();

    uploadZone.classList.remove("dragover");

    addFiles(event.dataTransfer.files);
  });

  fileInput.addEventListener("change", event => {

    addFiles(event.target.files);

    fileInput.value = "";
  });

  function renderPreviews() {

    previewGrid.innerHTML = "";

    localFiles.forEach((file, index) => {

      const card =
        document.createElement("div");

      card.className =
        "preview-card";

      if (index === selectedCoverIndex) {
        card.classList.add("cover-selected");
      }

      if (isHeicFile(file)) {

        const heicBox =
          document.createElement("div");

        heicBox.className =
          "heic-preview";

        heicBox.innerHTML =
          "HEIC / HEIF<br>Preview may not display";

        card.appendChild(heicBox);

      } else {

        const img =
          document.createElement("img");

        const reader =
          new FileReader();

        reader.onload = e => {

          img.src = e.target.result;
        };

        reader.readAsDataURL(file);

        card.appendChild(img);
      }

      const progress =
        uploadProgress[index] || 0;

      const statusType =
        uploadStatus[index] || "ready";

      const heicStatus =
        isHeicFile(file)
          ? `<div class="status heic">HEIC</div>`
          : "";

      const info =
        document.createElement("div");

      info.className =
        "preview-info";

      info.innerHTML = `

        <div class="preview-name">
          ${file.name}
        </div>

        <div class="preview-meta">
          ${(file.size / 1024 / 1024).toFixed(2)} MB
          <br>
          ${getContentType(file)}
        </div>

        ${heicStatus}

        <div class="status ${statusType}">
          ${
            statusType === "complete"
              ? "Complete"
              : statusType === "uploading"
              ? "Uploading"
              : statusType === "error"
              ? "Error"
              : "Ready"
          }
        </div>

        <div class="progress-wrap">
          <div
            class="progress-bar"
            style="width:${progress}%"
          ></div>
        </div>

        <div class="move-row">

          <button class="move-btn" onclick="moveLeft(${index})">
            ←
          </button>

          <button class="move-btn" onclick="moveRight(${index})">
            →
          </button>

        </div>

        <button
          class="cover-btn"
          onclick="setCover(${index})"
        >
          Cover
        </button>

        <button
          class="remove-btn"
          onclick="removeImage(${index})"
        >
          Remove
        </button>

      `;

      card.appendChild(info);

      previewGrid.appendChild(card);
    });
  }

  async function uploadAll() {

    if (!validateRequiredFields()) {
      return;
    }

    uploadedImages = [];

    const projectId =
      document.getElementById("projectId").value;

    const folderPath =
      document.getElementById("folderPath").value;

    const root =
      [projectId, folderPath]
      .filter(Boolean)
      .join("/");

    for (let index = 0; index < localFiles.length; index++) {

      try {

        const file =
          localFiles[index];

        const contentType =
          getContentType(file);

        uploadStatus[index] = "uploading";

        uploadProgress[index] = 5;

        renderPreviews();

        const presignResponse =
          await fetch("/api/r2-presign", {

            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({

              filename: file.name,

              folder: root,

              contentType: contentType
            })
          });

        const presignData =
          await presignResponse.json();

        uploadProgress[index] = 20;

        renderPreviews();

        const uploadResponse =
          await fetch(presignData.uploadUrl, {

            method: "PUT",

            headers: {
              "Content-Type": contentType
            },

            body: file
          });

        if (!uploadResponse.ok) {

          throw new Error(
            `Upload failed (${uploadResponse.status})`
          );
        }

        uploadProgress[index] = 100;

        uploadStatus[index] = "complete";

        uploadedImages.push({

          assetId:
            uniqueAssetId(file, index),

          filename:
            file.name,

          url:
            presignData.publicUrl,

          tags: [],

          caption: "",

          source: "r2",

          contentType:
            contentType
        });

        renderPreviews();

        generateJson();

      } catch (error) {

        uploadStatus[index] = "error";

        renderPreviews();

        console.error(error);
      }
    }
  }

  function buildOutput() {

    const galleryId =
      document.getElementById("galleryId").value;

    const title =
      document.getElementById("title").value;

    const projectId =
      document.getElementById("projectId").value;

    const folderPath =
      document.getElementById("folderPath").value;

    const city =
      document.getElementById("town").value;

    const state =
      document.getElementById("state").value;

    const manualTags =
      parseTags(
        document.getElementById("galleryTags").value
      );

    const folderTags =
      folderPath
        .split("/")
        .map(tag => tag.trim())
        .filter(Boolean);

    const autoTags =
      [
        city,
        state,
        ...folderTags
      ]
      .map(tag => tag.trim())
      .filter(Boolean);

    const tags =
      [...new Set([
        ...manualTags,
        ...autoTags
      ])];

    return {

      id: galleryId,

      projectId: projectId,

           path: folderPath,

      ownerId: "apostasy",

      visibility: "private",

           shareToken:
        window.scoutShareToken ||
        (
          window.scoutShareToken =
            `${galleryId}-${Date.now()}`
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, "-")
              .replace(/^-+|-+$/g, "")
        ),

      title: title,

      cover:
        uploadedImages[selectedCoverIndex]?.url || "",

      library: {

        locationName:
          document.getElementById("locationName").value,

        town:
          city,

        state:
          state,

        country:
          "USA",

        tags:
          tags
      },

      admin: {

        notes:
          document.getElementById("notes").value
      },

      images: uploadedImages
    };
  }

  function generateJson() {

    jsonOutput.value =
      JSON.stringify(
        buildOutput(),
        null,
        2
      );
  }

  function moveLeft(index) {

    if (index === 0) return;

    [localFiles[index - 1], localFiles[index]] =
    [localFiles[index], localFiles[index - 1]];

    renderPreviews();
  }

  function moveRight(index) {

    if (index >= localFiles.length - 1) return;

    [localFiles[index + 1], localFiles[index]] =
    [localFiles[index], localFiles[index + 1]];

    renderPreviews();
  }

  function removeImage(index) {

    localFiles.splice(index, 1);

    renderPreviews();
  }

  function setCover(index) {

    selectedCoverIndex = index;

    renderPreviews();

    generateJson();
  }

  function copyJson() {

    navigator.clipboard.writeText(
      jsonOutput.value
    );

    alert("Gallery entry copied.");
  }

  function downloadTextFile(filename, content) {

    const blob = new Blob(
      [content],
      {
        type: "application/json"
      }
    );

    const url =
      URL.createObjectURL(blob);

    const link =
      document.createElement("a");

    link.href = url;

    link.download =
      filename;

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

    URL.revokeObjectURL(url);
  }

  function downloadJson() {

    const galleryId =
      document.getElementById("galleryId").value || "gallery";

    downloadTextFile(
      `${galleryId}.json`,
      jsonOutput.value
    );
  }

  function buildProjectsBlock() {

    const output =
      buildOutput();

    return `{
  "id": "${output.projectId}",
  "name": "${displayTitleFromSlug(output.projectId)}",
  "cover": "${output.cover}",
  "library": {
    "projectType": "Film / TV"
  }
}`;
  }

  function copyProjectsBlock() {

    navigator.clipboard.writeText(
      buildProjectsBlock()
    );

    alert("Project entry copied.");
  }

  function downloadBundle() {

    const galleryId =
      document.getElementById("galleryId").value || "gallery";

    downloadTextFile(
      `${galleryId}.json`,
      jsonOutput.value
    );

    setTimeout(() => {

      downloadTextFile(
        `${galleryId}-project-entry.json`,
        buildProjectsBlock()
      );

    }, 500);
  }

  loadSession();

</script>

</body>
</html>
