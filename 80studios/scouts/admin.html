<!DOCTYPE html>
<html>
<head>
  <title>Scout Admin Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    a {
      color: #999;
      text-decoration: none;
    }

    a:hover {
      color: white;
      text-decoration: underline;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 24px;
      font-size: 14px;
    }

    label {
      display: block;
      color: #aaa;
      font-size: 13px;
      margin-top: 14px;
      margin-bottom: 5px;
    }

    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      background: #1c1c1c;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
    }

    textarea {
      min-height: 160px;
      font-family: monospace;
      white-space: pre;
    }

    button {
      margin-top: 8px;
      background: #2a2a2a;
      color: white;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background: #333;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .panel {
      background: #181818;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 16px;
      margin-top: 18px;
    }

    .output-title {
      color: #aaa;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .upload-zone {
      margin-top: 12px;
      border: 2px dashed #444;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      color: #888;
      background: #141414;
      transition: 0.2s;
    }

    .upload-zone.dragover {
      border-color: #888;
      background: #1d1d1d;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .preview-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      overflow: hidden;
    }

    .preview-card.cover-selected {
      border: 2px solid #71d685;
    }

    .preview-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
      background: #222;
    }

    .preview-info {
      padding: 10px;
    }

    .preview-name {
      font-size: 12px;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .preview-meta {
      color: #888;
      font-size: 11px;
      line-height: 1.4;
    }

    .remove-btn {
      width: 100%;
      background: #3b1717;
      border: 1px solid #5c2222;
      color: #f07a7a;
    }

    .cover-btn {
      width: 100%;
      background: #18351d;
      border: 1px solid #2d5a33;
      color: #71d685;
    }

    .cover-btn.active {
      background: #2d5a33;
      color: white;
    }

    .move-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .move-btn {
      flex: 1;
    }

    .order-badge {
      display: inline-block;
      margin-bottom: 8px;
      background: #222;
      border: 1px solid #444;
      color: #aaa;
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 999px;
    }
  </style>
</head>

<body>

<a href="/scouts/">← Back to Scouts</a>

<h1>Admin Planner</h1>

<div class="subtitle">
  Local upload preparation, metadata generation, and future R2 asset management.
</div>

<div class="panel">
  <div class="grid">

    <div>
      <label>Type</label>
      <select id="type">
        <option value="scout">Scout Gallery</option>
        <option value="lookbook">Lookbook</option>
      </select>
    </div>

    <div>
      <label>Project ID</label>
      <input id="projectId" value="harbor-noir">
    </div>

    <div>
      <label>Folder Path</label>
      <input id="folderPath" value="blackwater-inn/int-blackwater-inn/dining-room/heroes">
    </div>

    <div>
      <label>Gallery ID</label>
      <input id="galleryId" value="blackwater-dining-room-heroes">
    </div>

    <div>
      <label>Display Title</label>
      <input id="title" value="Blackwater Inn — Dining Room — Heroes">
    </div>

  </div>
</div>

<div class="panel">
  <div class="output-title">
    Local Upload Queue
  </div>

  <div class="upload-zone" id="uploadZone">
    Drag & Drop Scout Photos Here
    <br><br>
    No uploads yet — local preview only
  </div>

  <div class="preview-grid" id="previewGrid"></div>
</div>

<div class="panel">
  <div class="output-title">
    Generated Asset JSON
  </div>

  <button onclick="copyJson()">
    Copy JSON
  </button>

  <textarea id="jsonOutput" readonly></textarea>
</div>

<script>
  const PUBLIC_BASE =
    "https://pub-6f2a633f65d94c21ac63975ce07c6c7c.r2.dev/80scouts";

  const uploadZone =
    document.getElementById("uploadZone");

  const previewGrid =
    document.getElementById("previewGrid");

  const jsonOutput =
    document.getElementById("jsonOutput");

  let localFiles = [];
  let selectedCoverIndex = 0;

  const TAG_KEYWORDS = {
    restaurant: [
      "restaurant",
      "dining",
      "kitchen",
      "bar",
      "cafe",
      "diner"
    ],
    waterfront: [
      "water",
      "dock",
      "marina",
      "harbor",
      "ocean",
      "beach"
    ],
    residential: [
      "house",
      "home",
      "bedroom",
      "living",
      "apartment"
    ],
    office: [
      "office",
      "conference",
      "cubicle",
      "desk"
    ],
    street: [
      "street",
      "road",
      "alley",
      "parking",
      "garage"
    ],
    night: [
      "night",
      "dark",
      "evening"
    ],
    exterior: [
      "ext",
      "exterior"
    ],
    interior: [
      "int",
      "interior"
    ]
  };

  function slugify(value) {
    return value
      .toLowerCase()
      .trim()
      .replace(/&/g, "and")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  function extractTags(text) {
    const lower =
      text.toLowerCase();

    const foundTags =
      new Set();

    Object.entries(TAG_KEYWORDS)
      .forEach(([tag, keywords]) => {
        keywords.forEach(keyword => {
          if (lower.includes(keyword)) {
            foundTags.add(tag);
          }
        });
      });

    return [...foundTags];
  }

  uploadZone.addEventListener("dragover", event => {
    event.preventDefault();
    uploadZone.classList.add("dragover");
  });

  uploadZone.addEventListener("dragleave", () => {
    uploadZone.classList.remove("dragover");
  });

  uploadZone.addEventListener("drop", event => {
    event.preventDefault();
    uploadZone.classList.remove("dragover");

    const files =
      [...event.dataTransfer.files]
        .filter(file =>
          file.type.startsWith("image/")
        );

    localFiles = files;
    selectedCoverIndex = 0;

    renderPreviews();
    generateJson();
  });

  function renderPreviews() {
    previewGrid.innerHTML = "";

    localFiles.forEach((file, index) => {
      const card =
        document.createElement("div");

      card.className =
        "preview-card";

      if (index === selectedCoverIndex) {
        card.classList.add("cover-selected");
      }

      const img =
        document.createElement("img");

      const reader =
        new FileReader();

      reader.onload = e => {
        img.src = e.target.result;
      };

      reader.readAsDataURL(file);

      const info =
        document.createElement("div");

      info.className =
        "preview-info";

      const dimensionsId =
        `dimensions-${index}`;

      const autoTags =
        extractTags(file.name);

      info.innerHTML = `
        <div class="order-badge">
          Position #${index + 1}
        </div>

        <div class="preview-name">
          ${file.name}
        </div>

        <div class="preview-meta">
          ${(file.size / 1024 / 1024).toFixed(2)} MB
          <br>
          ${file.type}
          <br>
          <span id="${dimensionsId}">
            Loading dimensions...
          </span>
          <br><br>
          Auto Tags:
          ${autoTags.join(", ") || "none"}
        </div>

        <div class="move-row">
          <button class="move-btn" onclick="moveLeft(${index})">
            ← Left
          </button>

          <button class="move-btn" onclick="moveRight(${index})">
            Right →
          </button>
        </div>

        <button
          class="cover-btn ${index === selectedCoverIndex ? "active" : ""}"
          onclick="setCover(${index})"
        >
          ${index === selectedCoverIndex ? "Cover Image" : "Set As Cover"}
        </button>

        <button class="remove-btn" onclick="removeImage(${index})">
          Remove
        </button>
      `;

      card.appendChild(img);
      card.appendChild(info);
      previewGrid.appendChild(card);

      img.onload = () => {
        const orientation =
          img.naturalWidth > img.naturalHeight
            ? "Landscape"
            : "Portrait";

        document.getElementById(dimensionsId).innerHTML =
          `${img.naturalWidth} × ${img.naturalHeight} • ${orientation}`;
      };
    });
  }

  function moveLeft(index) {
    if (index === 0) return;

    [localFiles[index - 1], localFiles[index]] =
    [localFiles[index], localFiles[index - 1]];

    if (selectedCoverIndex === index) {
      selectedCoverIndex = index - 1;
    }
    else if (selectedCoverIndex === index - 1) {
      selectedCoverIndex = index;
    }

    renderPreviews();
    generateJson();
  }

  function moveRight(index) {
    if (index >= localFiles.length - 1) return;

    [localFiles[index + 1], localFiles[index]] =
    [localFiles[index], localFiles[index + 1]];

    if (selectedCoverIndex === index) {
      selectedCoverIndex = index + 1;
    }
    else if (selectedCoverIndex === index + 1) {
      selectedCoverIndex = index;
    }

    renderPreviews();
    generateJson();
  }

  function removeImage(index) {
    localFiles.splice(index, 1);

    if (selectedCoverIndex >= localFiles.length) {
      selectedCoverIndex = 0;
    }

    renderPreviews();
    generateJson();
  }

  function setCover(index) {
    selectedCoverIndex = index;

    renderPreviews();
    generateJson();
  }

  function generateJson() {
    const projectId =
      slugify(
        document.getElementById("projectId").value
      );

    const folderPathRaw =
      document.getElementById("folderPath").value;

    const folderPath =
      folderPathRaw
        .split("/")
        .map(slugify)
        .filter(Boolean)
        .join("/");

    const galleryId =
      slugify(
        document.getElementById("galleryId").value
      );

    const title =
      document.getElementById("title").value.trim();

    const root =
      `${projectId}/${folderPath}`;

    const folderTags =
      extractTags(folderPathRaw);

    const imageTags =
      localFiles.flatMap(file =>
        extractTags(file.name)
      );

    const combinedTags =
      [...new Set([
        ...folderTags,
        ...imageTags
      ])];

    const images =
      localFiles.map((file, index) => ({
        assetId:
          `${galleryId}-${String(index + 1).padStart(3, "0")}`,

        url:
          `${PUBLIC_BASE}/${root}/${file.name}`,

        filename:
          file.name,

        tags:
          extractTags(file.name),

        caption: "",

        source: "r2"
      }));

    const output = {
      id: galleryId,
      title: title,
      subtitle: projectId,
      cover:
        images[selectedCoverIndex]?.url || "",

      library: {
        locationId: "",
        locationName: "",
        town: "",
        state: "",
        country: "USA",
        tags: combinedTags,
        categories: combinedTags,
        looks: combinedTags,
        searchTerms: combinedTags,
        archivedProjects: []
      },

      admin: {},
      images: images
    };

    jsonOutput.value =
      JSON.stringify(output, null, 2);
  }

  function copyJson() {
    navigator.clipboard.writeText(
      jsonOutput.value
    );

    alert("JSON copied.");
  }
</script>

</body>
</html>
