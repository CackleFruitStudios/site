<!DOCTYPE html>
<html>
<head>
  <title>Admin Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    a {
      color: #999;
      text-decoration: none;
    }

    a:hover {
      color: white;
      text-decoration: underline;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .top-nav {
      margin-bottom: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .top-nav a,
    .logout-btn {
      display: inline-block;
      color: #999;
      font-size: 14px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .top-nav a:hover,
    .logout-btn:hover {
      color: #fff;
      text-decoration: underline;
    }

    .user-badge {
      color: #777;
      font-size: 13px;
      margin-left: auto;
    }

    .subtitle {
      color: #888;
      margin-bottom: 24px;
      font-size: 14px;
    }

    label {
      display: block;
      color: #aaa;
      font-size: 13px;
      margin-top: 14px;
      margin-bottom: 5px;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      background: #1c1c1c;
      color: white;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
    }

    input[readonly] {
      color: #aaa;
      background: #151515;
    }

    textarea {
      min-height: 220px;
      font-family: monospace;
      white-space: pre;
    }

    button {
      margin-top: 8px;
      background: #2a2a2a;
      color: white;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #333;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .panel {
      background: #181818;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 16px;
      margin-top: 18px;
    }

    .output-title {
      color: #aaa;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .upload-zone {
      margin-top: 12px;
      border: 2px dashed #444;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      color: #888;
      background: #141414;
    }

    .upload-zone.dragover {
      border-color: #71d685;
      background: #172018;
    }

    .mobile-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .hidden-file-input {
      display: none;
    }

    .hint {
      color: #888;
      font-size: 12px;
      margin-top: 8px;
      line-height: 1.4;
    }

    .warning {
      margin-top: 12px;
      background: #3b1717;
      border: 1px solid #5c2222;
      color: #ffb0b0;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .preview-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      overflow: hidden;
    }

    .preview-card.cover-selected {
      border: 2px solid #71d685;
    }

    .preview-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
      background: #222;
    }

    .heic-preview {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #222;
      color: #aaa;
      font-size: 13px;
      text-align: center;
      padding: 12px;
      box-sizing: border-box;
    }

    .preview-info {
      padding: 10px;
    }

    .preview-name {
      font-size: 12px;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .preview-meta {
      color: #888;
      font-size: 11px;
      line-height: 1.4;
    }

    .progress-wrap {
      margin-top: 8px;
      height: 8px;
      background: #222;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #71d685;
      transition: width 0.2s;
    }

    .status {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 10px;
      background: #222;
      color: #aaa;
    }

    .status.uploading {
      background: #4d3a12;
      color: #f4cb68;
    }

    .status.complete {
      background: #18351d;
      color: #71d685;
    }

    .status.error {
      background: #3b1717;
      color: #ff8f8f;
    }

    .status.heic {
      background: #1b2740;
      color: #9fc5ff;
    }

    .remove-btn {
      width: 100%;
      background: #3b1717;
      border: 1px solid #5c2222;
      color: #f07a7a;
    }

    .cover-btn {
      width: 100%;
      background: #18351d;
      border: 1px solid #2d5a33;
      color: #71d685;
    }

    .move-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .move-btn {
      flex: 1;
    }
  </style>
</head>

<body>

<div class="top-nav">
  <a href="/scouts/">Projects</a>
  <a href="/scouts/scout.html">Scout Dashboard</a>
  <a href="/scouts/library.html">Library</a>
  <a href="/scouts/admin.html">Admin</a>
  <button class="logout-btn" onclick="logout()">Logout</button>
  <div class="user-badge" id="user-badge"></div>
</div>

<h1>Admin Planner</h1>

<div class="subtitle" id="subtitle">
  Cloudflare R2 Upload + JPG Normalization System
</div>

<div id="admin-content">

<div class="panel">

  <div class="grid">

    <div>
      <label>Project Name *</label>
      <input id="projectName" placeholder="Good Fellas">
    </div>

    <div>
      <label>Location Name *</label>
      <input id="locationName" placeholder="George's Apartment">
    </div>

    <div>
      <label>Gallery Name *</label>
      <input id="galleryName" placeholder="125 E 51st St">
    </div>

    <div>
      <label>Optional Folder Path (Leave blank unless authorized)</label>
      <input id="galleryPath" placeholder="season-4/episode-403/georges-apartment">
    </div>

    <div>
      <label>Town / City</label>
      <input id="town" placeholder="Queens">
    </div>

    <div>
      <label>State</label>
      <input id="state" placeholder="NY">
    </div>

    <div>
      <label>Optional Tags</label>
      <input id="galleryTags" placeholder="period,mob,restaurant">
    </div>

  </div>

  <label>Scout Notes</label>

  <textarea id="notes"></textarea>

  <div class="warning" id="warningBox"></div>

</div>

<div class="panel">

  <div class="output-title">
    Auto Generated
  </div>

  <div class="grid">

    <div>
      <label>Project ID</label>
      <input id="projectId" readonly>
    </div>

    <div>
      <label>Folder Path</label>
      <input id="folderPath" readonly>
    </div>

    <div>
      <label>Gallery ID</label>
      <input id="galleryId" readonly>
    </div>

    <div>
      <label>Display Title</label>
      <input id="title" readonly>
    </div>

  </div>

</div>

<div class="panel">

  <div class="output-title">
    Upload Queue
  </div>

  <div class="upload-zone" id="uploadZone">
    Drag & Drop Scout Photos Here
    <div class="hint">
      HEIC / HEIF mobile photos supported.
      Uploads are normalized to JPG for web viewing.
    </div>
  </div>

  <div class="mobile-actions">

    <button onclick="document.getElementById('fileInput').click()">
      Choose Photos / Camera Roll
    </button>

    <button onclick="uploadAll()">
      Upload All
    </button>

  </div>

  <input
    class="hidden-file-input"
    id="fileInput"
    type="file"
    multiple
    accept="image/*,.heic,.heif"
  >

  <div class="preview-grid" id="previewGrid"></div>

</div>

<div class="panel">

  <div class="output-title">
    Upload Status
  </div>

  <div class="hint" id="uploadStatusMessage">
    Ready.
  </div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/heic2any/dist/heic2any.min.js"></script>

<script>
  const SESSION_KEY =
    "eightyStudiosScoutUser";

  const STORAGE_KEY =
    "scout-admin-session";

  const DISPLAY_MAX_SIZE =
    1920;

  const THUMBNAIL_MAX_SIZE =
    420;

  const JPEG_QUALITY =
    0.82;

  const savedUser =
    sessionStorage.getItem(SESSION_KEY);

  if (!savedUser) {
    window.location.href =
      "/scouts/login.html";
  }

  const currentUser =
    savedUser ? JSON.parse(savedUser) : null;

  const currentUserId =
    currentUser?.id || "";

  const currentUserRole =
    currentUser?.globalRole || "";

  const allowedAdminRoles =
    [
      "admin",
      "lm",
      "alm"
    ];

  const userBadgeEl =
    document.getElementById("user-badge");

  const subtitleEl =
    document.getElementById("subtitle");

  const adminContentEl =
    document.getElementById("admin-content");

  if (currentUser) {
    userBadgeEl.textContent =
      `${currentUser.name} · ${currentUserRole}`;
  }

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    window.location.href =
      "/scouts/login.html";
  }

  function userCanUseAdmin() {
    return allowedAdminRoles.includes(currentUserRole);
  }

  if (!userCanUseAdmin()) {
    subtitleEl.textContent =
      "Access denied.";

    adminContentEl.innerHTML = `
      <div class="panel">
        <p class="warning" style="display:block;">
          This account does not have upload admin access.
        </p>
      </div>
    `;
  }

  const uploadZone =
    document.getElementById("uploadZone");

  const previewGrid =
    document.getElementById("previewGrid");

  const fileInput =
    document.getElementById("fileInput");

  const warningBox =
    document.getElementById("warningBox");

  const uploadStatusMessage =
    document.getElementById("uploadStatusMessage");

  let localFiles = [];

  let uploadedImages = [];

  let uploadProgress = {};

  let uploadStatus = {};

  let selectedCoverIndex = 0;

  function slugify(value) {

    return (value || "")
      .toLowerCase()
      .trim()
      .replace(/'/g, "")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  function uniqueAssetId(file, index) {

    const timestamp =
      Date.now();

    return `${slugify(file.name)}-${timestamp}-${index}`;
  }

  function displayTitleFromSlug(value) {

    return value
      .replace(/-/g, " ")
      .replace(/\b\w/g, char => char.toUpperCase());
  }

  function parseTags(value) {

    return value
      .split(",")
      .map(tag => tag.trim())
      .filter(Boolean);
  }

  function isHeicFile(file) {

    const name =
      file.name.toLowerCase();

    return (
      name.endsWith(".heic") ||
      name.endsWith(".heif") ||
      file.type === "image/heic" ||
      file.type === "image/heif"
    );
  }

  function getContentType(file) {

    if (file.type) {
      return file.type;
    }

    if (isHeicFile(file)) {
      return "image/heic";
    }

    return "application/octet-stream";
  }

  function getBaseFilename(file) {

    return (file.name || "image")
      .replace(/\.[^/.]+$/, "");
  }

  function blobToImage(blob) {

    return new Promise((resolve, reject) => {

      const url =
        URL.createObjectURL(blob);

      const img =
        new Image();

      img.onload = () => {

        URL.revokeObjectURL(url);

        resolve(img);
      };

      img.onerror = () => {

        URL.revokeObjectURL(url);

        reject(
          new Error("Could not read image for conversion.")
        );
      };

      img.src = url;
    });
  }

  function canvasToJpegBlob(canvas, quality = JPEG_QUALITY) {

    return new Promise((resolve, reject) => {

      canvas.toBlob(blob => {

        if (!blob) {

          reject(
            new Error("Could not create JPG output.")
          );

          return;
        }

        resolve(blob);

      }, "image/jpeg", quality);
    });
  }

  async function convertHeicToJpegBlob(file) {

    if (!window.heic2any) {

      throw new Error(
        "HEIC converter did not load. Refresh and try again."
      );
    }

    const converted =
      await window.heic2any({
        blob: file,
        toType: "image/jpeg",
        quality: JPEG_QUALITY
      });

    return Array.isArray(converted)
      ? converted[0]
      : converted;
  }

  async function resizeImageBlob(blob, maxSize) {

    const img =
      await blobToImage(blob);

    const originalWidth =
      img.naturalWidth || img.width;

    const originalHeight =
      img.naturalHeight || img.height;

    const scale =
      Math.min(
        1,
        maxSize / Math.max(originalWidth, originalHeight)
      );

    const width =
      Math.round(originalWidth * scale);

    const height =
      Math.round(originalHeight * scale);

    const canvas =
      document.createElement("canvas");

    canvas.width =
      width;

    canvas.height =
      height;

    const context =
      canvas.getContext("2d");

    context.drawImage(
      img,
      0,
      0,
      width,
      height
    );

    return canvasToJpegBlob(canvas);
  }

  async function buildProcessedImageFiles(file) {

    let sourceBlob =
      file;

    if (isHeicFile(file)) {

      setUploadStatus(
        `Converting HEIC: ${file.name}`
      );

      sourceBlob =
        await convertHeicToJpegBlob(file);
    }

    setUploadStatus(
      `Creating display image: ${file.name}`
    );

    const displayBlob =
      await resizeImageBlob(
        sourceBlob,
        DISPLAY_MAX_SIZE
      );

    setUploadStatus(
      `Creating thumbnail: ${file.name}`
    );

    const thumbnailBlob =
      await resizeImageBlob(
        sourceBlob,
        THUMBNAIL_MAX_SIZE
      );

    const base =
      slugify(getBaseFilename(file));

    return {
      display: {
        blob: displayBlob,
        filename: `${base}-display.jpg`,
        contentType: "image/jpeg"
      },
      thumbnail: {
        blob: thumbnailBlob,
        filename: `${base}-thumb.jpg`,
        contentType: "image/jpeg"
      }
    };
  }

  async function uploadBlobToR2(blob, filename, folder, contentType) {

    const presignResponse =
      await fetch("/api/r2-presign", {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({

          filename,

          folder,

          contentType
        })
      });

    const presignData =
      await presignResponse.json();

    if (!presignResponse.ok || !presignData.uploadUrl) {

      throw new Error(
        presignData.error || "Could not prepare R2 upload."
      );
    }

    const uploadResponse =
      await fetch(presignData.uploadUrl, {

        method: "PUT",

        headers: {
          "Content-Type": contentType
        },

        body: blob
      });

    if (!uploadResponse.ok) {

      throw new Error(
        `Upload failed (${uploadResponse.status})`
      );
    }

    return presignData.publicUrl;
  }

  function showWarning(message) {

    warningBox.style.display = "block";

    warningBox.innerText = message;
  }

  function clearWarning() {

    warningBox.style.display = "none";

    warningBox.innerText = "";
  }

  function setUploadStatus(message) {

    if (!uploadStatusMessage) return;

    uploadStatusMessage.innerHTML =
      message;
  }

  function setUploadSuccess(message) {

    setUploadStatus(`
      <span class="status complete">
        ${message}
      </span>
    `);
  }

  function setUploadError(message) {

    setUploadStatus(`
      <span class="status error">
        ${message}
      </span>
    `);
  }

  function validateRequiredFields() {

    const projectName =
      document.getElementById("projectName").value.trim();

    const locationName =
      document.getElementById("locationName").value.trim();

    const galleryName =
      document.getElementById("galleryName").value.trim();

    if (!projectName || !locationName || !galleryName) {

      showWarning(
        "Project Name, Location Name, and Gallery Name are required before uploading."
      );

      return false;
    }

    clearWarning();

    return true;
  }

  function autoGenerate() {

    const projectName =
      document.getElementById("projectName").value;

    const locationName =
      document.getElementById("locationName").value;

    const galleryName =
      document.getElementById("galleryName").value;

    const galleryPathRaw =
      document.getElementById("galleryPath").value.trim();

    const defaultPath =
      locationName
        ? slugify(locationName)
        : "";

    const activePath =
      galleryPathRaw || defaultPath;

    const pathSegments =
      activePath
        .split("/")
        .map(segment => slugify(segment))
        .filter(Boolean);

    const gallerySlug =
      slugify(galleryName);

    document.getElementById("projectId").value =
      slugify(projectName);

    document.getElementById("folderPath").value =
      pathSegments.join("/");

    document.getElementById("galleryId").value =
      gallerySlug
        ? `${pathSegments.join("-")}-${gallerySlug}`
            .replace(/^-+|-+$/g, "")
        : "";

    document.getElementById("title").value =
      galleryName || "";

    saveSession();

    if (uploadedImages.length > 0) {
      setUploadStatus(
        `${uploadedImages.length} image${uploadedImages.length === 1 ? "" : "s"} ready to save.`
      );
    }
  }

  function saveSession() {

    const data = {

      projectName:
        document.getElementById("projectName").value,

      locationName:
        document.getElementById("locationName").value,

      galleryName:
        document.getElementById("galleryName").value,

      galleryPath:
        document.getElementById("galleryPath").value,

      town:
        document.getElementById("town").value,

      state:
        document.getElementById("state").value,

      galleryTags:
        document.getElementById("galleryTags").value,

      notes:
        document.getElementById("notes").value
    };

    localStorage.setItem(
      STORAGE_KEY,
      JSON.stringify(data)
    );
  }

  function loadSession() {

    const saved =
      localStorage.getItem(STORAGE_KEY);

    if (!saved) return;

    try {

      const data =
        JSON.parse(saved);

      Object.entries(data).forEach(([key, value]) => {

        const element =
          document.getElementById(key);

        if (element) {
          element.value = value;
        }
      });

      autoGenerate();

    } catch (error) {

      console.error(error);
    }
  }

  function addFiles(files) {

    const incoming =
      [...files]
        .filter(file =>
          file.type.startsWith("image/") ||
          isHeicFile(file)
        );

    localFiles =
      [
        ...localFiles,
        ...incoming
      ];

    uploadedImages = [];

    uploadProgress = {};

    uploadStatus = {};

    selectedCoverIndex = 0;

    renderPreviews();

    autoGenerate();
  }

  [
    "projectName",
    "locationName",
    "galleryName",
    "galleryPath",
    "town",
    "state",
    "galleryTags",
    "notes"
  ].forEach(id => {

    document
      .getElementById(id)
      .addEventListener("input", autoGenerate);
  });

  uploadZone.addEventListener("dragover", event => {

    event.preventDefault();

    uploadZone.classList.add("dragover");
  });

  uploadZone.addEventListener("dragleave", () => {

    uploadZone.classList.remove("dragover");
  });

  uploadZone.addEventListener("drop", event => {

    event.preventDefault();

    uploadZone.classList.remove("dragover");

    addFiles(event.dataTransfer.files);
  });

  fileInput.addEventListener("change", event => {

    addFiles(event.target.files);

    fileInput.value = "";
  });

  function renderPreviews() {

    previewGrid.innerHTML = "";

    localFiles.forEach((file, index) => {

      const card =
        document.createElement("div");

      card.className =
        "preview-card";

      if (index === selectedCoverIndex) {
        card.classList.add("cover-selected");
      }

      const uploadedImage =
        uploadedImages[index];

      if (
        uploadedImage &&
        uploadedImage.thumbnailUrl
      ) {

        const img =
          document.createElement("img");

        img.src =
          uploadedImage.thumbnailUrl;

        card.appendChild(img);

      } else if (isHeicFile(file)) {

        const heicBox =
          document.createElement("div");

        heicBox.className =
          "heic-preview";

        heicBox.innerHTML =
          "HEIC / HEIF<br>Display conversion pending";

        card.appendChild(heicBox);

      } else {

        const img =
          document.createElement("img");

        const reader =
          new FileReader();

        reader.onload = e => {

          img.src = e.target.result;
        };

        reader.readAsDataURL(file);

        card.appendChild(img);
      }

      const progress =
        uploadProgress[index] || 0;

      const statusType =
        uploadStatus[index] || "ready";

      const heicStatus =
        isHeicFile(file)
          ? `<div class="status heic">HEIC</div>`
          : "";

      const info =
        document.createElement("div");

      info.className =
        "preview-info";

      info.innerHTML = `

        <div class="preview-name">
          ${file.name}
        </div>

        <div class="preview-meta">
          ${(file.size / 1024 / 1024).toFixed(2)} MB
          <br>
          ${getContentType(file)}
        </div>

        ${heicStatus}

        <div class="status ${statusType}">
          ${
            statusType === "complete"
              ? "Complete"
              : statusType === "uploading"
              ? "Uploading"
              : statusType === "error"
              ? "Error"
              : "Ready"
          }
        </div>

        <div class="progress-wrap">
          <div
            class="progress-bar"
            style="width:${progress}%"
          ></div>
        </div>

        <div class="move-row">

          <button class="move-btn" onclick="moveLeft(${index})">
            ←
          </button>

          <button class="move-btn" onclick="moveRight(${index})">
            →
          </button>

        </div>

        <button
          class="cover-btn"
          onclick="setCover(${index})"
        >
          Cover
        </button>

        <button
          class="remove-btn"
          onclick="removeImage(${index})"
        >
          Remove
        </button>

      `;

      card.appendChild(info);

      previewGrid.appendChild(card);
    });
  }

  async function uploadAll() {

    if (!userCanUseAdmin()) {
      showWarning(
        "This account does not have upload admin access."
      );

      return;
    }

    if (!validateRequiredFields()) {
      return;
    }

    uploadedImages = [];

    setUploadStatus(
      "Uploading photos..."
    );

    const projectId =
      document.getElementById("projectId").value;

    const folderPath =
      document.getElementById("folderPath").value;

    const galleryId =
      document.getElementById("galleryId").value;

    const root =
      [projectId, folderPath, galleryId]
        .filter(Boolean)
        .join("/");

    for (let index = 0; index < localFiles.length; index++) {

      try {

        const file =
          localFiles[index];

        uploadStatus[index] = "uploading";

        uploadProgress[index] = 5;

        renderPreviews();

        const processed =
          await buildProcessedImageFiles(file);

        uploadProgress[index] = 30;

        renderPreviews();

        setUploadStatus(
          `Uploading display image: ${file.name}`
        );

        const displayUrl =
          await uploadBlobToR2(
            processed.display.blob,
            processed.display.filename,
            root,
            processed.display.contentType
          );

        uploadProgress[index] = 70;

        renderPreviews();

        setUploadStatus(
          `Uploading thumbnail: ${file.name}`
        );

        const thumbnailUrl =
          await uploadBlobToR2(
            processed.thumbnail.blob,
            processed.thumbnail.filename,
            root,
            processed.thumbnail.contentType
          );

        uploadProgress[index] = 100;

        uploadStatus[index] = "complete";

        uploadedImages.push({

          assetId:
            uniqueAssetId(file, index),

          filename:
            processed.display.filename,

          url:
            displayUrl,

          displayUrl:
            displayUrl,

          thumbnailUrl:
            thumbnailUrl,

          tags: [],

          caption: "",

          source: "r2",

          contentType:
            "image/jpeg"
        });

        renderPreviews();

        setUploadStatus(
          `${uploadedImages.length} image${uploadedImages.length === 1 ? "" : "s"} uploaded.`
        );

      } catch (error) {

        uploadStatus[index] = "error";

        renderPreviews();

        console.error(error);
      }
    }

    if (!uploadedImages.length) {
      showWarning(
        "No images uploaded successfully, so nothing was saved to D1."
      );

      return;
    }

    setUploadStatus(
      "Saving project, folder, gallery, and images to D1..."
    );

    try {

      const galleryData =
        buildOutput();

      setUploadStatus(
        "Saving project..."
      );

      const projectResponse =
        await fetch("/api/project-save", {

          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body:
            JSON.stringify({
              id: galleryData.projectId,
              title: displayTitleFromSlug(galleryData.projectId),
              slug: galleryData.projectId,
              description: "",
              status: "active",
              createdBy: currentUserId
            })
        });

      const projectResult =
        await projectResponse.json();

      if (!projectResponse.ok || !projectResult.success) {

        throw new Error(
          projectResult.error || "Project save failed"
        );
      }

      setUploadStatus(
        "Saving folder..."
      );

      const folderResponse =
        await fetch("/api/folder-save", {

          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body:
            JSON.stringify({
              id: galleryData.folderId,
              projectId: galleryData.projectId,
              title: displayTitleFromSlug(galleryData.folderId),
              slug: galleryData.folderId,
              folderType: "location",
              sortOrder: 0,
              createdBy: currentUserId
            })
        });

      const folderResult =
        await folderResponse.json();

      if (!folderResponse.ok || !folderResult.success) {

        throw new Error(
          folderResult.error || "Folder save failed"
        );
      }

      setUploadStatus(
        "Saving gallery and image records..."
      );

      const galleryResponse =
        await fetch("/api/gallery-save", {

          method: "POST",

          headers: {
            "Content-Type": "application/json"
          },

          body:
            JSON.stringify(galleryData)
        });

      const galleryResult =
        await galleryResponse.json();

      console.log({
        projectResult,
        folderResult,
        galleryResult
      });

      if (!galleryResponse.ok || !galleryResult.success) {

        throw new Error(
          galleryResult.error || "Gallery save failed"
        );
      }

      clearWarning();

      setUploadSuccess(
        `Upload complete. Saved to D1: ${galleryData.id}`
      );

    } catch (error) {

      showWarning(
        error.message || "D1 save failed"
      );

      setUploadError(
        error.message || "D1 save failed"
      );

      console.error(error);
    }
  }

  function buildOutput() {

    const galleryId =
      document.getElementById("galleryId").value;

    const title =
      document.getElementById("title").value;

    const galleryName =
      document.getElementById("galleryName").value;

    const projectId =
      document.getElementById("projectId").value;

    const folderPath =
      document.getElementById("folderPath").value;

    const folderId =
      folderPath
        .split("/")
        .filter(Boolean)
        .join("-");

    const city =
      document.getElementById("town").value;

    const state =
      document.getElementById("state").value;

    const manualTags =
      parseTags(
        document.getElementById("galleryTags").value
      );

    const folderTags =
      folderPath
        .split("/")
        .map(tag => tag.trim())
        .filter(Boolean);

    const autoTags =
      [
        city,
        state,
        ...folderTags
      ]
        .map(tag => tag.trim())
        .filter(Boolean);

    const tags =
      [...new Set([
        ...manualTags,
        ...autoTags
      ])];

    return {

      id: galleryId,

      projectId: projectId,

      folderId: folderId,

      path: folderPath,

      ownerId: currentUserId,

      visibility: "private",

      shareToken:
        window.scoutShareToken ||
        (
          window.scoutShareToken =
            `${galleryId}-${Date.now()}`
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, "-")
              .replace(/^-+|-+$/g, "")
        ),

      title: title,

      cover:
        uploadedImages[selectedCoverIndex]?.url || "",

      library: {

        locationName:
          galleryName,

        town:
          city,

        state:
          state,

        country:
          "USA",

        tags:
          tags
      },

      admin: {

        notes:
          document.getElementById("notes").value
      },

      images: uploadedImages
    };
  }

  function moveLeft(index) {

    if (index === 0) return;

    [localFiles[index - 1], localFiles[index]] =
    [localFiles[index], localFiles[index - 1]];

    renderPreviews();
  }

  function moveRight(index) {

    if (index >= localFiles.length - 1) return;

    [localFiles[index + 1], localFiles[index]] =
    [localFiles[index], localFiles[index + 1]];

    renderPreviews();
  }

  function removeImage(index) {

    localFiles.splice(index, 1);

    renderPreviews();
  }

  function setCover(index) {

    selectedCoverIndex = index;

    renderPreviews();

    setUploadStatus(
      `Cover selected: image ${index + 1}.`
    );
  }

  if (userCanUseAdmin()) {
    loadSession();
  }
</script>
