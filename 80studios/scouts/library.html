<!DOCTYPE html>
<html>
<head>
  <title>Scout Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body { margin: 0; background: #111; color: white; font-family: Arial, sans-serif; padding: 20px; }
    a { color: inherit; text-decoration: none; }
    .back-link { display: inline-block; color: #888; font-size: 13px; margin-bottom: 12px; }
    .back-link:hover { color: #fff; }
    .top-nav { margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
    .top-nav a, .logout-btn { display: inline-block; color: #999; font-size: 14px; background: none; border: none; padding: 0; cursor: pointer; font-family: Arial, sans-serif; }
    .top-nav a:hover, .logout-btn:hover { color: #fff; text-decoration: underline; }
    .user-badge { color: #777; font-size: 13px; margin-left: auto; }
    h1 { font-size: 28px; margin-bottom: 6px; }
    .subtitle { color: #888; margin-bottom: 24px; font-size: 14px; }
    .search-wrap { margin-bottom: 20px; }
    .search-input { width: 100%; box-sizing: border-box; background: #1c1c1c; border: 1px solid #333; color: white; padding: 12px 14px; border-radius: 6px; font-size: 14px; outline: none; }
    .search-input:focus { border-color: #555; }
    .section-title { color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-top: 30px; margin-bottom: 10px; }
    .location-card { background: #1c1c1c; border: 1px solid #333; border-radius: 6px; padding: 15px; margin-top: 12px; }
    .location-header { display: flex; gap: 14px; align-items: flex-start; }
    .thumb { width: 140px; height: 90px; object-fit: cover; border-radius: 4px; background: #222; flex-shrink: 0; }
    .location-title { font-size: 20px; margin-bottom: 4px; }
    .meta { color: #aaa; font-size: 12px; margin-top: 4px; line-height: 1.4; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .tag { background: #282828; border: 1px solid #3a3a3a; border-radius: 999px; padding: 4px 8px; color: #aaa; font-size: 12px; }
    .gallery-list { margin-top: 14px; border-top: 1px solid #333; padding-top: 10px; }
    .gallery-link { display: block; padding: 8px 0; color: #ddd; font-size: 14px; }
    .gallery-link:hover { color: #fff; text-decoration: underline; }
    .message { color: #aaa; }
    .result-count { color: #777; font-size: 12px; margin-bottom: 10px; }
    hr { border: none; border-top: 1px solid #333; margin: 12px 0; }

    @media (max-width: 600px) {
      .location-header { display: block; }
      .thumb { width: 100%; height: 180px; margin-bottom: 10px; }
    }
  </style>
</head>

<body>

<a class="back-link" href="/scouts/">← Back to Scouts</a>

<div class="top-nav">
  <a href="/scouts/">Projects</a>
  <a href="/scouts/scout.html">Scout Dashboard</a>
  <a href="/scouts/gallery-manager.html">Gallery Manager</a>
  <a href="/scouts/library.html">Library</a>
  <a href="/scouts/admin.html">Admin</a>
  <button class="logout-btn" onclick="logout()">Logout</button>
  <div class="user-badge" id="user-badge"></div>
</div>

<h1>Location Library</h1>

<div class="subtitle" id="subtitle">
  Reusable scout archive for file pulls, past locations, and cross-project reference.
</div>

<hr>

<div class="search-wrap">
  <input
    type="text"
    id="search"
    class="search-input"
    placeholder="Search locations, towns, states, projects, galleries, tags..."
  >
</div>

<div class="result-count" id="result-count"></div>

<div id="content">Loading library...</div>

<script>
  const SESSION_KEY = "eightyStudiosScoutUser";

  const PROJECTS_URL = "/api/project-list";
  const GALLERIES_URL = "/api/gallery-list";
  const PROJECT_MEMBERS_URL = "/api/project-member-list";
  const LOCATION_TAGS_URL = "/api/location-tag-list";

  const savedUser =
    sessionStorage.getItem(SESSION_KEY);

  if (!savedUser) {
    window.location.href = "/scouts/login.html";
  }

  const currentUser =
    savedUser ? JSON.parse(savedUser) : null;

  const currentUserId =
    currentUser?.id || "";

  const currentUserRole =
    currentUser?.globalRole || "";

  const contentEl =
    document.getElementById("content");

  const searchInput =
    document.getElementById("search");

  const resultCountEl =
    document.getElementById("result-count");

  const userBadgeEl =
    document.getElementById("user-badge");

  const subtitleEl =
    document.getElementById("subtitle");

  let masterLibrary = {};

  if (currentUser) {
    userBadgeEl.textContent =
      `${currentUser.name} · ${currentUserRole}`;

    subtitleEl.textContent =
      currentUserRole === "admin"
        ? "Full location archive across all scout content."
        : `Location archive available to ${currentUser.name}.`;
  }

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    window.location.href = "/scouts/login.html";
  }

  function userIsAdmin() {
    return currentUserRole === "admin";
  }

  function titleFromSlug(value) {
    return (value || "")
      .replace(/-/g, " ")
      .replace(/\b\w/g, char => char.toUpperCase());
  }

  function getProjectId(project) {
    return project.id || project.projectId || project.project_id || "";
  }

  function getProjectTitle(project) {
    return project.title || project.name || titleFromSlug(getProjectId(project));
  }

  function getGalleryProjectId(gallery) {
    return gallery.projectId || gallery.project_id || "";
  }

  function getGalleryFolderId(gallery) {
    return gallery.folderId || gallery.folder_id || "";
  }

  function getGalleryLocationName(gallery) {
    return (
      gallery.locationName ||
      gallery.location_name ||
      gallery.title ||
      gallery.name ||
      gallery.id
    );
  }

  function getGalleryTown(gallery) {
    return gallery.town || "";
  }

  function getGalleryState(gallery) {
    return gallery.state || "";
  }

  function getGalleryCountry(gallery) {
    return gallery.country || "";
  }

  function getGalleryCover(gallery) {
    return gallery.cover || gallery.url || gallery.imageUrl || gallery.image_url || "";
  }

  function getImageCount(gallery) {
    return Number(gallery.imageCount || gallery.image_count || 0);
  }

  function getMemberProjectId(member) {
    return member.projectId || member.project_id || "";
  }

  function getMemberUserId(member) {
    return member.userId || member.user_id || "";
  }

  function getVisibleProjectIds(members) {
    if (userIsAdmin()) {
      return null;
    }

    return members
      .filter(member => getMemberUserId(member) === currentUserId)
      .map(member => getMemberProjectId(member));
  }

  function getGalleryTags(galleryId, tags) {
    return tags
      .filter(tag => tag.galleryId === galleryId)
      .map(tag => tag.tag);
  }

  function photoLabel(count) {
    return `${count} ${count === 1 ? "photo" : "photos"}`;
  }

  function buildLibrary(projects, galleries, tags) {
    const library = {};

    galleries.forEach(gallery => {
      const projectId =
        getGalleryProjectId(gallery);

      const project =
        projects.find(item =>
          getProjectId(item) === projectId
        );

      const locationName =
        getGalleryLocationName(gallery);

      const town =
        getGalleryTown(gallery);

      const state =
        getGalleryState(gallery);

      const country =
        getGalleryCountry(gallery);

      const locationKey =
        [
          locationName,
          town,
          state,
          country
        ]
          .filter(Boolean)
          .join("|")
          .toLowerCase();

      if (!library[locationKey]) {
        library[locationKey] = {
          locationName,
          town,
          state,
          country,
          cover: getGalleryCover(gallery),
          projects: new Set(),
          galleries: []
        };
      }

      const item =
        library[locationKey];

      if (!item.cover) {
        item.cover =
          getGalleryCover(gallery);
      }

      if (project) {
        item.projects.add(getProjectTitle(project));
      } else if (projectId) {
        item.projects.add(titleFromSlug(projectId));
      }

      item.galleries.push({
        id: gallery.id,
        title: gallery.title || gallery.name || gallery.id,
        projectId,
        folderId: getGalleryFolderId(gallery),
        imageCount: getImageCount(gallery),
        tags: getGalleryTags(gallery.id, tags)
      });
    });

    return library;
  }

  function matchesSearch(location, query) {
    if (!query) return true;

    const searchable = [
      location.locationName,
      location.town,
      location.state,
      location.country,
      ...location.projects,
      ...location.galleries.map(gallery => gallery.title),
      ...location.galleries.map(gallery => gallery.projectId),
      ...location.galleries.map(gallery => gallery.folderId),
      ...location.galleries.flatMap(gallery => gallery.tags || [])
    ]
      .join(" ")
      .toLowerCase();

    return searchable.includes(query);
  }

  function renderLibrary(library, query = "") {
    const locations =
      Object.values(library)
        .filter(location =>
          matchesSearch(location, query)
        )
        .sort((a, b) =>
          a.locationName.localeCompare(b.locationName)
        );

    resultCountEl.textContent =
      `${locations.length} location${locations.length !== 1 ? "s" : ""}`;

    if (!locations.length) {
      contentEl.innerHTML = `
        <p class="message">
          No matching locations found.
        </p>
      `;
      return;
    }

    let html = `
      <div class="section-title">
        Locations
      </div>
    `;

    locations.forEach(location => {
      const locationTags =
        [
          location.town,
          location.state,
          location.country,
          ...location.galleries.flatMap(gallery => gallery.tags || [])
        ]
          .filter(Boolean);

      html += `
        <div class="location-card">

          <div class="location-header">

            ${location.cover
              ? `<img src="${location.cover}" class="thumb">`
              : ""
            }

            <div>
              <div class="location-title">
                ${location.locationName}
              </div>

              <div class="meta">
                ${location.town}${location.state ? ", " + location.state : ""}${location.country ? " · " + location.country : ""}
              </div>

              <div class="meta">
                Projects:
                ${[...location.projects].join(", ")}
              </div>

              <div class="tags">
                ${locationTags.map(tag => `
                  <span class="tag">${tag}</span>
                `).join("")}
              </div>
            </div>

          </div>

          <div class="gallery-list">
      `;

      location.galleries.forEach(gallery => {
        html += `
          <a
            class="gallery-link"
            href="/scouts/gallery.html?gallery=${encodeURIComponent(gallery.id)}"
          >
            ${gallery.title}

            <div class="meta">
              ${titleFromSlug(gallery.projectId)}
              ${gallery.folderId ? " / " + titleFromSlug(gallery.folderId) : ""}
              •
              ${photoLabel(gallery.imageCount)}
            </div>
          </a>
        `;
      });

      html += `
          </div>
        </div>
      `;
    });

    contentEl.innerHTML = html;
  }

  searchInput.addEventListener("input", function() {
    const query =
      searchInput.value
        .trim()
        .toLowerCase();

    renderLibrary(masterLibrary, query);
  });

  Promise.all([
    fetch(PROJECTS_URL).then(response => response.json()),
    fetch(GALLERIES_URL).then(response => response.json()),
    fetch(PROJECT_MEMBERS_URL).then(response => response.json()),
    fetch(LOCATION_TAGS_URL).then(response => response.json())
  ])
    .then(([projectsData, galleriesData, membersData, tagsData]) => {
      const projects =
        projectsData.projects || [];

      const galleries =
        galleriesData.galleries || [];

      const members =
        membersData.members || [];

      const tags =
        tagsData.tags || [];

      const visibleProjectIds =
        getVisibleProjectIds(members);

      const visibleGalleries =
        visibleProjectIds === null
          ? galleries
          : galleries.filter(gallery =>
              visibleProjectIds.includes(getGalleryProjectId(gallery))
            );

      masterLibrary =
        buildLibrary(projects, visibleGalleries, tags);

      renderLibrary(masterLibrary);
    })

    .catch(error => {
      console.error(error);

      contentEl.innerHTML = `
        <p class="message">
          Could not load library from D1.
        </p>
      `;
    });
</script>

</body>
</html>
