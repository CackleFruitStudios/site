<!DOCTYPE html>
<html>
<head>
  <title>80 Studios Scouts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body { margin: 0; background: #111; color: white; font-family: Arial, sans-serif; padding: 20px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    h2 { font-size: 18px; margin-top: 0; margin-bottom: 8px; }
    a { color: white; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; max-width: 760px; line-height: 1.5; }
    .top-nav { margin-bottom: 22px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
    .top-nav a, .logout-btn { display: inline-block; color: #999; text-decoration: none; font-size: 14px; background: none; border: none; padding: 0; cursor: pointer; font-family: Arial, sans-serif; }
    .top-nav a:hover, .logout-btn:hover { color: #fff; text-decoration: underline; }
    .user-badge { color: #777; font-size: 13px; margin-left: auto; }
    .portal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; margin-bottom: 34px; }
    .portal-card { display: block; background: #1c1c1c; border: 1px solid #333; border-radius: 8px; padding: 18px; color: white; }
    .portal-card:hover { background: #252525; text-decoration: none; }
    .portal-label { color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .portal-description { color: #999; font-size: 13px; line-height: 1.45; }
    .section-title { color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-top: 28px; margin-bottom: 10px; }
    .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
    .project-card { display: block; background: #1c1c1c; border: 1px solid #333; border-radius: 8px; overflow: hidden; color: white; }
    .project-card:hover { background: #252525; text-decoration: none; }
    .thumb { width: 100%; height: 170px; object-fit: cover; display: block; background: #222; }
    .project-info { padding: 14px; }
    .meta { color: #aaa; font-size: 12px; margin-top: 4px; line-height: 1.4; }
    .message { color: #aaa; margin-top: 14px; }
  </style>
</head>

<body>

<h1>80 Studios Scouts</h1>

<div class="subtitle" id="subtitle">
  Location scouting upload, gallery, and project management system for 80 Studios.
</div>

<div class="top-nav" id="top-nav"></div>

<div id="portals-section">
  <div class="section-title">
    Portals
  </div>

  <div class="portal-grid" id="portal-grid"></div>
</div>

<div class="section-title" id="project-section-title">
  Current Projects
</div>

<div id="content">
  Loading projects...
</div>

<script>
  const SESSION_KEY = "eightyStudiosScoutUser";

  const PROJECTS_URL = "/api/project-list";
  const GALLERIES_URL = "/api/gallery-list";
  const PROJECT_MEMBERS_URL = "/api/project-member-list";

  const savedUser =
    sessionStorage.getItem(SESSION_KEY);

  if (!savedUser) {
    window.location.href = "/scouts/login.html";
  }

  const currentUser =
    savedUser ? JSON.parse(savedUser) : null;

  const currentUserId =
    currentUser?.id || "";

  const currentUserRole =
    currentUser?.globalRole || "";

  const subtitleEl =
    document.getElementById("subtitle");

  const sectionTitleEl =
    document.getElementById("project-section-title");

  const topNavEl =
    document.getElementById("top-nav");

  const portalGridEl =
    document.getElementById("portal-grid");

  const portalsSectionEl =
    document.getElementById("portals-section");

  const content =
    document.getElementById("content");

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    window.location.href = "/scouts/login.html";
  }

  function userIsAdmin() {
    return currentUserRole === "admin";
  }

  function userCanUseScoutTools() {
    return ["admin", "lm", "alm", "scout"].includes(currentUserRole);
  }

  function userCanUseAdminTools() {
    return ["admin", "lm", "alm"].includes(currentUserRole);
  }

  function userCanUseLibrary() {
    return ["admin", "lm", "alm", "scout"].includes(currentUserRole);
  }

  function titleFromSlug(value) {
    return (value || "")
      .replace(/-/g, " ")
      .replace(/\b\w/g, char => char.toUpperCase());
  }

  function getGalleryCover(gallery) {
    return gallery.cover || gallery.url || gallery.imageUrl || gallery.image_url || "";
  }

  function getProjectCover(project, galleries) {
    return project.cover || getGalleryCover(galleries[0]) || "";
  }

  function getProjectGalleryCount(projectId, galleries) {
    return galleries.filter(gallery => gallery.projectId === projectId).length;
  }

  function getMemberProjectId(member) {
    return member.projectId || member.project_id || "";
  }

  function getMemberUserId(member) {
    return member.userId || member.user_id || "";
  }

  function getMemberRole(member) {
    return member.projectRole || member.project_role || "";
  }

  function getVisibleProjects(projects, members) {
    if (userIsAdmin()) {
      return projects;
    }

    const allowedProjectIds =
      members
        .filter(member => getMemberUserId(member) === currentUserId)
        .map(member => getMemberProjectId(member));

    return projects.filter(project =>
      allowedProjectIds.includes(project.id)
    );
  }

  function getProjectRole(projectId, members) {
    if (userIsAdmin()) {
      return "admin";
    }

    const member =
      members.find(item =>
        getMemberUserId(item) === currentUserId &&
        getMemberProjectId(item) === projectId
      );

    return member ? getMemberRole(member) : "";
  }

  function renderTopNav() {
    let html = `
      <a href="/scouts/">Projects</a>
    `;

    if (userCanUseScoutTools()) {
      html += `
        <a href="/scouts/scout.html">Scout Dashboard</a>
      `;
    }

    if (userCanUseLibrary()) {
      html += `
        <a href="/scouts/library.html">Library</a>
      `;
    }

    if (userCanUseAdminTools()) {
      html += `
        <a href="/scouts/admin.html">Upload Admin</a>
      `;
    }

    html += `
      <button class="logout-btn" onclick="logout()">Logout</button>
      <div class="user-badge">${currentUser.name} · ${currentUserRole}</div>
    `;

    topNavEl.innerHTML = html;
  }

  function renderPortals() {
    if (currentUserRole === "client") {
      portalsSectionEl.style.display = "none";
      return;
    }

    let html = "";

    if (userIsAdmin()) {
      html += `
        <a class="portal-card" href="/scouts/admin-portal.html">
          <div class="portal-label">Admin Portal</div>
          <h2>Full Access Dashboard</h2>
          <div class="portal-description">
            For full project, gallery, upload, library, and future user management.
          </div>
        </a>
      `;
    }

    if (userCanUseScoutTools()) {
      html += `
        <a class="portal-card" href="/scouts/scout.html">
          <div class="portal-label">Scout Portal</div>
          <h2>Field Upload Workflow</h2>
          <div class="portal-description">
            For registered scouts to view assigned projects, galleries, and scout work.
          </div>
        </a>
      `;
    }

    if (userCanUseLibrary()) {
      html += `
        <a class="portal-card" href="/scouts/library.html">
          <div class="portal-label">Library</div>
          <h2>Location Archive</h2>
          <div class="portal-description">
            Cross-project location library. Master access will eventually search all uploaded scout content.
          </div>
        </a>
      `;
    }

    portalGridEl.innerHTML = html;
  }

  if (currentUser) {
    subtitleEl.textContent =
      currentUserRole === "client"
        ? `Client access for ${currentUser.name}`
        : `Signed in as ${currentUser.name}`;

    sectionTitleEl.textContent =
      userIsAdmin() ? "Current Projects" : "Assigned Projects";

    renderTopNav();
    renderPortals();
  }

  Promise.all([
    fetch(PROJECTS_URL).then(response => response.json()),
    fetch(GALLERIES_URL).then(response => response.json()),
    fetch(PROJECT_MEMBERS_URL).then(response => response.json())
  ])

    .then(([projectsData, galleriesData, membersData]) => {
      const projects = projectsData.projects || [];
      const galleries = galleriesData.galleries || [];
      const members = membersData.members || [];

      const visibleProjects =
        getVisibleProjects(projects, members);

      if (!visibleProjects.length) {
        content.innerHTML = `
          <div class="message">
            No projects found for this account.
          </div>
        `;
        return;
      }

      content.innerHTML = `
        <div class="project-grid">
          ${visibleProjects.map(project => {
            const projectGalleries =
              galleries.filter(gallery => gallery.projectId === project.id);

            const cover =
              getProjectCover(project, projectGalleries);

            const role =
              getProjectRole(project.id, members);

            const projectUrl =
              `/scouts/project.html?project=${encodeURIComponent(project.id)}`;

            return `
              <a class="project-card" href="${projectUrl}">
                ${cover ? `<img src="${cover}" class="thumb">` : ""}

                <div class="project-info">
                  <h2>
                    ${project.title || project.name || titleFromSlug(project.id)}
                  </h2>

                  <div class="meta">
                    ${getProjectGalleryCount(project.id, galleries)} galleries
                  </div>

                  ${role ? `<div class="meta">Role: ${role}</div>` : ""}
                </div>
              </a>
            `;
          }).join("")}
        </div>
      `;
    })

    .catch(error => {
      console.error(error);

      content.innerHTML = `
        <div class="message">
          Could not load project, gallery, or membership data.
        </div>
      `;
    });
</script>

</body>
</html>
