<!DOCTYPE html>
<html>
<head>
  <title>80 Studios Scouts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .project {
      margin-top: 24px;
    }

    .folder {
      margin-top: 12px;
      padding-left: 12px;
      border-left: 1px solid #333;
    }

    .card {
      display: block;
      background: #1c1c1c;
      color: white;
      text-decoration: none;
      padding: 15px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #333;
    }

    .card:hover {
      background: #252525;
    }

.thumb {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 4px;
  margin-bottom: 10px;
  background: #222;
}


.folder h3 {
  cursor: pointer;
  color: #ddd;
}

.folder h3::before {
  content: "▾ ";
  color: #777;
}

.folder.collapsed h3::before {
  content: "▸ ";
}

.folder.collapsed > .folder,
.folder.collapsed > .card {
  display: none;
}
    
    
    .meta {
      color: #aaa;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>

<body>

<h1>80 Studios Scouts</h1>
<div id="content">Loading projects...</div>

<script>
  const DATA_URL = "/data/projects.json";
  const content = document.getElementById("content");

  function renderFolders(folders) {
    let html = "";

    folders.forEach(folder => {
      html += `<div class="folder"><h3>${folder.name}</h3>`;

      (folder.galleries || []).forEach(gallery => {
  const thumb = gallery.images?.[0] || "";

  html += `
    <a class="card" href="/scouts/gallery.html?gallery=${gallery.id}">
      ${thumb ? `<img src="${thumb}" class="thumb">` : ""}
      <div>${gallery.title}</div>
      <div class="meta">${gallery.subtitle || ""}</div>
    </a>
  `;
});
      if (folder.folders && folder.folders.length > 0) {
        html += renderFolders(folder.folders);
      }

      html += `</div>`;
    });

    return html;
  }

  fetch(DATA_URL)
    .then(response => response.json())
    .then(data => {
      let html = "";

      (data.projects || []).forEach(project => {
        html += `<div class="project"><h2>${project.name}</h2>`;
        html += renderFolders(project.folders || []);
        html += `</div>`;
      });

      content.innerHTML = html || "No projects found.";
    })
    .catch(error => {
      content.innerHTML = "Could not load project data.";
      console.error(error);
    });

document.addEventListener("click", function(event) {
  if (event.target.tagName === "H3") {
    event.target.parentElement.classList.toggle("collapsed");
  }
});


  
</script>

</body>
</html>
