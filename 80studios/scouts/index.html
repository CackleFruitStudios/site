<!DOCTYPE html>
<html>
<head>
  <title>80 Studios Scouts</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body { margin: 0; background: #111; color: white; font-family: Arial, sans-serif; padding: 20px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    h2 { font-size: 18px; margin-top: 0; margin-bottom: 8px; }
    a { color: white; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; max-width: 760px; line-height: 1.5; }
    .top-nav { margin-bottom: 22px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
    .top-nav a, .logout-btn { display: inline-block; color: #999; font-size: 14px; background: none; border: none; padding: 0; cursor: pointer; font-family: Arial, sans-serif; }
    .top-nav a:hover, .logout-btn:hover { color: #fff; text-decoration: underline; }
    .user-badge { color: #777; font-size: 13px; margin-left: auto; }
    .section-title { color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-top: 28px; margin-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px; }
    .card { display: block; background: #1c1c1c; border: 1px solid #333; border-radius: 8px; color: white; padding: 18px; }
    .card:hover { background: #252525; text-decoration: none; }
    .meta { color: #aaa; font-size: 12px; margin-top: 4px; line-height: 1.4; }
    .message { color: #aaa; margin-top: 14px; }
  </style>
</head>

<body>

<h1>80 Studios Scouts</h1>

<div class="subtitle" id="subtitle">
  Loading account...
</div>

<div class="top-nav" id="top-nav"></div>

<div id="create-section" style="display:none;">
  <div class="section-title">Create</div>
  <div class="grid">
    <a class="card" href="/scouts/create-project.html">
      <h2>+ Create Project</h2>
      <div class="meta">Start a new scouting project.</div>
    </a>
  </div>
</div>

<div class="section-title" id="project-title">
  Assigned Projects
</div>

<div id="content">
  Loading projects...
</div>

<script>
  const SESSION_KEY = "eightyStudiosScoutUser";
  const PROJECTS_URL = "/api/project-list";
  const PROJECT_MEMBERS_URL = "/api/project-member-list";

  const savedUser = sessionStorage.getItem(SESSION_KEY);

  if (!savedUser) {
    window.location.href = "/scouts/login.html";
  }

  const currentUser = savedUser ? JSON.parse(savedUser) : null;
  const currentUserId = currentUser?.id || "";
  const currentUserRole = currentUser?.globalRole || "";

  const subtitleEl = document.getElementById("subtitle");
  const topNavEl = document.getElementById("top-nav");
  const createSectionEl = document.getElementById("create-section");
  const projectTitleEl = document.getElementById("project-title");
  const contentEl = document.getElementById("content");

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    window.location.href = "/scouts/login.html";
  }

  function userIsMaster() {
    return currentUserRole === "master";
  }

  function userCanUseAdminTools() {
    return ["master", "lm", "alm"].includes(currentUserRole);
  }

  function userCanUseLibrary() {
    return ["master", "lm", "alm", "scout"].includes(currentUserRole);
  }

  function titleFromSlug(value) {
    return (value || "")
      .replace(/-/g, " ")
      .replace(/\b\w/g, char => char.toUpperCase());
  }

  function getProjectId(project) {
    return project.id || project.projectId || project.project_id || "";
  }

  function getProjectTitle(project) {
    return project.title || project.name || titleFromSlug(getProjectId(project));
  }

  function getMemberProjectId(member) {
    return member.projectId || member.project_id || "";
  }

  function getMemberUserId(member) {
    return member.userId || member.user_id || "";
  }

  function getMemberRole(member) {
    return member.projectRole || member.project_role || "";
  }

  function getVisibleProjects(projects, members) {
    if (userIsMaster()) {
      return projects;
    }

    const allowedProjectIds = members
      .filter(member => getMemberUserId(member) === currentUserId)
      .map(member => getMemberProjectId(member));

    return projects.filter(project =>
      allowedProjectIds.includes(getProjectId(project))
    );
  }

  function getProjectRole(projectId, members) {
    if (userIsMaster()) {
      return "master";
    }

    const member = members.find(item =>
      getMemberUserId(item) === currentUserId &&
      getMemberProjectId(item) === projectId
    );

    return member ? getMemberRole(member) : "";
  }

  function renderTopNav() {
    let html = `<a href="/scouts/">Projects</a>`;

    if (userIsMaster()) {
      html += `<a href="/scouts/master-portal.html">Master Portal</a>`;
    }

    if (["lm", "alm"].includes(currentUserRole)) {
      html += `<a href="/scouts/admin-portal.html">LM / ALM Portal</a>`;
    }

    if (currentUserRole === "scout") {
      html += `<a href="/scouts/scout-portal.html">Scout Portal</a>`;
    }

    if (userCanUseAdminTools()) {
      html += `<a href="/scouts/create-project.html">Create Project</a>`;
      html += `<a href="/scouts/folder-manager.html">Folder Manager</a>`;
      html += `<a href="/scouts/admin.html">Upload</a>`;
    }

    if (userCanUseLibrary()) {
      html += `<a href="/scouts/library.html">Library</a>`;
    }

    html += `
      <button class="logout-btn" onclick="logout()">Logout</button>
      <div class="user-badge">${currentUser?.name || "User"} · ${currentUserRole}</div>
    `;

    topNavEl.innerHTML = html;
  }

  function renderProjects(projects, members) {
    const visibleProjects = getVisibleProjects(projects, members);

    if (!visibleProjects.length) {
      contentEl.innerHTML = `
        <div class="message">
          No projects found for this account.
        </div>
      `;
      return;
    }

    contentEl.innerHTML = `
      <div class="grid">
        ${visibleProjects.map(project => {
          const projectId = getProjectId(project);
          const role = getProjectRole(projectId, members);

          return `
            <a class="card" href="/scouts/project.html?project=${encodeURIComponent(projectId)}">
              <h2>${getProjectTitle(project)}</h2>
              <div class="meta">Project ID: ${projectId}</div>
              ${role ? `<div class="meta">Role: ${role}</div>` : ""}
            </a>
          `;
        }).join("")}
      </div>
    `;
  }

  if (currentUser) {
    subtitleEl.textContent = `Signed in as ${currentUser.name}`;
    projectTitleEl.textContent = userIsMaster() ? "Current Projects" : "Assigned Projects";

    if (userCanUseAdminTools()) {
      createSectionEl.style.display = "block";
    }

    renderTopNav();
  }

  Promise.all([
    fetch(PROJECTS_URL).then(response => response.json()),
    fetch(PROJECT_MEMBERS_URL).then(response => response.json())
  ])
    .then(([projectsData, membersData]) => {
      const projects = projectsData.projects || [];
      const members = membersData.members || [];
      renderProjects(projects, members);
    })
    .catch(error => {
      console.error(error);

      contentEl.innerHTML = `
        <div class="message">
          Could not load projects or memberships.
        </div>
      `;
    });
</script>

</body>
</html>
