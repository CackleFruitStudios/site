<!DOCTYPE html>
<html>
<head>
  <title>Scout Gallery</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>

    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      padding: 20px;
      text-align: center;
    }

    .back-link {
      display: inline-block;
      color: #888;
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .back-link:hover {
      color: #fff;
    }

    .breadcrumb {
      color: #999;
      font-size: 13px;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .breadcrumb a {
      color: inherit;
      text-decoration: none;
    }

    .breadcrumb a:hover {
      color: #fff;
      text-decoration: underline;
    }

    .breadcrumb span {
      color: #aaa;
    }

    .header h1 {
      font-size: 24px;
      margin: 0 0 8px 0;
    }

    .header p {
      margin: 0;
      color: #aaa;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 5px;
      padding: 5px;
    }

    .grid img {
      width: 100%;
      height: auto;
      display: block;
      cursor: pointer;
      background: #222;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .lightbox img {
      max-width: 95%;
      max-height: 95%;
    }

    .counter {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }

    .nav-button {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      font-size: 42px;
      color: white;
      background: rgba(0,0,0,0.45);
      border: none;
      padding: 12px 18px;
      cursor: pointer;
      z-index: 101;
    }

    .nav-button:hover {
      background: rgba(255,255,255,0.12);
    }

    .nav-prev {
      left: 20px;
    }

    .nav-next {
      right: 20px;
    }

    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 10px 0;
    }

    .message {
      padding: 30px;
      text-align: center;
      color: #aaa;
    }

  </style>
</head>

<body>

<div class="header">

  <a class="back-link" href="/scouts/">
    ← Back to Scouts
  </a>

  <hr>

  <div class="breadcrumb" id="breadcrumb"></div>

  <hr>

  <h1 id="gallery-title">
    Loading gallery...
  </h1>

  <hr>

  <p id="gallery-subtitle"></p>

</div>

<div class="grid" id="gallery-grid"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">

  <button
    class="nav-button nav-prev"
    onclick="prevImage(event)"
  >
    ‹
  </button>

  <img
    id="lightbox-img"
    onclick="event.stopPropagation()"
  >

  <button
    class="nav-button nav-next"
    onclick="nextImage(event)"
  >
    ›
  </button>

  <div class="counter" id="counter"></div>

</div>

<script>

  const GALLERIES_URL =
    "/data/galleries.json";

  const params =
    new URLSearchParams(window.location.search);

  const galleryId =
    params.get("gallery");

  const titleEl =
    document.getElementById("gallery-title");

  const subtitleEl =
    document.getElementById("gallery-subtitle");

  const breadcrumbEl =
    document.getElementById("breadcrumb");

  const gridEl =
    document.getElementById("gallery-grid");

  const lightbox =
    document.getElementById("lightbox");

  const lightboxImg =
    document.getElementById("lightbox-img");

  const counterEl =
    document.getElementById("counter");

  let currentImages = [];
  let currentIndex = 0;

  function titleFromSlug(value) {

    return value
      .replace(/-/g, " ")
      .replace(/\b\w/g, char => char.toUpperCase());
  }

  function getImageUrl(image) {

    if (typeof image === "string") {
      return image;
    }

    return image.url || "";
  }

  function updateLightbox() {

    if (!currentImages.length) {
      return;
    }

    lightboxImg.src =
      getImageUrl(currentImages[currentIndex]);

    counterEl.textContent =
      `${currentIndex + 1} / ${currentImages.length}`;
  }

  function openLightbox(index) {

    currentIndex = index;

    updateLightbox();

    lightbox.style.display = "flex";
  }

  function closeLightbox() {

    lightbox.style.display = "none";

    lightboxImg.src = "";
  }

  function prevImage(event) {

    event.stopPropagation();

    if (!currentImages.length) {
      return;
    }

    currentIndex--;

    if (currentIndex < 0) {
      currentIndex = currentImages.length - 1;
    }

    updateLightbox();
  }

  function nextImage(event) {

    event.stopPropagation();

    if (!currentImages.length) {
      return;
    }

    currentIndex++;

    if (currentIndex >= currentImages.length) {
      currentIndex = 0;
    }

    updateLightbox();
  }

  document.addEventListener("keydown", function(event) {

    if (lightbox.style.display !== "flex") {
      return;
    }

    if (event.key === "ArrowLeft") {
      prevImage(event);
    }

    if (event.key === "ArrowRight") {
      nextImage(event);
    }

    if (event.key === "Escape") {
      closeLightbox();
    }
  });

  let touchStartX = 0;
  let touchEndX = 0;

  lightbox.addEventListener("touchstart", function(event) {

    touchStartX =
      event.changedTouches[0].screenX;
  });

  lightbox.addEventListener("touchend", function(event) {

    touchEndX =
      event.changedTouches[0].screenX;

    if (touchEndX < touchStartX - 50) {
      nextImage(event);
    }

    if (touchEndX > touchStartX + 50) {
      prevImage(event);
    }
  });

  fetch(GALLERIES_URL)

    .then(response => response.json())

    .then(data => {

      const galleries =
        data.galleries || [];

      const gallery =
        galleries.find(
          item => item.id === galleryId
        );

      if (!gallery) {

        titleEl.textContent =
          "Gallery Not Found";

        gridEl.innerHTML = `
          <div class="message">
            Check the gallery ID in the URL.
          </div>
        `;

        return;
      }

      const pathParts =
        (gallery.path || "")
          .split("/")
          .filter(Boolean);

      let breadcrumbHtml = `
        <a href="/scouts/">
          Projects
        </a>
      `;

      breadcrumbHtml += `
        /
        <a href="/scouts/project.html?project=${gallery.projectId}">
          ${titleFromSlug(gallery.projectId)}
        </a>
      `;

      pathParts.forEach((part, index) => {

        const partial =
          pathParts
            .slice(0, index + 1)
            .join("/");

        breadcrumbHtml += " / ";

        const isLast =
          index === pathParts.length - 1;

        if (isLast) {

          breadcrumbHtml += `
            <span>${titleFromSlug(part)}</span>
          `;

        } else {

          breadcrumbHtml += `
            <a href="/scouts/folder.html?project=${gallery.projectId}&path=${partial}">
              ${titleFromSlug(part)}
            </a>
          `;
        }
      });

      breadcrumbEl.innerHTML =
        breadcrumbHtml;

      titleEl.textContent =
        gallery.title || "Untitled Gallery";

      subtitleEl.textContent =
        `${(gallery.images || []).length} photos`;

      currentImages =
        gallery.images || [];

      if (!currentImages.length) {

        gridEl.innerHTML = `
          <div class="message">
            No images added yet.
          </div>
        `;

        return;
      }

      currentImages.forEach((image, index) => {

        const src =
          getImageUrl(image);

        const img =
          document.createElement("img");

        img.src = src;

        img.alt =
          gallery.title || "Scout Image";

        img.onclick =
          () => openLightbox(index);

        gridEl.appendChild(img);
      });
    })

    .catch(error => {

      console.error(error);

      titleEl.textContent =
        "Could Not Load Gallery";

      gridEl.innerHTML = `
        <div class="message">
          There was a problem loading galleries.json.
        </div>
      `;
    });

</script>

</body>
</html>
