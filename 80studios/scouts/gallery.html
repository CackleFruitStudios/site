<!DOCTYPE html>
<html>
<head>
  <title>Scout Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 22px;
      margin: 0 0 6px 0;
    }

    .header p {
      margin: 0;
      color: #aaa;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 5px;
    }

    .grid img {
      width: 100%;
      height: auto;
      display: block;
      cursor: pointer;
      background: #222;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .lightbox img {
      max-width: 95%;
      max-height: 95%;
    }

    .message {
      padding: 30px;
      text-align: center;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="header">
  <h1 id="gallery-title">Loading gallery...</h1>
  <p id="gallery-subtitle"></p>
</div>

<div class="grid" id="gallery-grid"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
  const DATA_URL = "/data/projects.json";

  const params = new URLSearchParams(window.location.search);
  const galleryId = params.get("gallery") || "test-gallery";

  const titleEl = document.getElementById("gallery-title");
  const subtitleEl = document.getElementById("gallery-subtitle");
  const gridEl = document.getElementById("gallery-grid");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  function findGallery(projects, id) {
    for (const project of projects) {
      const found = searchFolders(project.folders || [], id);
      if (found) return found;
    }
    return null;
  }

  function searchFolders(folders, id) {
    for (const folder of folders) {
      for (const gallery of folder.galleries || []) {
        if (gallery.id === id) return gallery;
      }

      const found = searchFolders(folder.folders || [], id);
      if (found) return found;
    }
    return null;
  }

  function openLightbox(src) {
    lightbox.style.display = "flex";
    lightboxImg.src = src;
  }

  function closeLightbox() {
    lightbox.style.display = "none";
    lightboxImg.src = "";
  }

  fetch(DATA_URL)
    .then(response => response.json())
    .then(data => {
      const gallery = findGallery(data.projects || [], galleryId);

      if (!gallery) {
        titleEl.textContent = "Gallery not found";
        gridEl.innerHTML = '<div class="message">Check the gallery ID in the URL.</div>';
        return;
      }

      titleEl.textContent = gallery.title || "Untitled Gallery";
      subtitleEl.textContent = gallery.subtitle || "";

      if (!gallery.images || gallery.images.length === 0) {
        gridEl.innerHTML = '<div class="message">No images added yet.</div>';
        return;
      }

      gallery.images.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = gallery.title || "Scout image";
        img.onclick = () => openLightbox(src);
        gridEl.appendChild(img);
      });
    })
    .catch(error => {
      titleEl.textContent = "Could not load gallery";
      gridEl.innerHTML = '<div class="message">There was a problem loading projects.json.</div>';
      console.error(error);
    });
</script>

</body>
</html>
