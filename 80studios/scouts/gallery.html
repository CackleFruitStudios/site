<!DOCTYPE html>
<html>
<head>
  <title>Scout Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    .header {
      padding: 20px;
      text-align: center;
    }

    .back-link {
      display: inline-block;
      color: #888;
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .back-link:hover {
      color: #fff;
    }

 .breadcrumb {
  color: #999;
  font-size: 13px;
  margin-bottom: 10px;
  line-height: 1.4;
}

.breadcrumb a {
  color: inherit;
  text-decoration: none;
}

.breadcrumb a:hover {
  color: #fff;
  text-decoration: underline;
}

.breadcrumb span {
  color: #aaa;
}

    .header h1 {
      font-size: 22px;
      margin: 0 0 6px 0;
    }

    .header p {
      margin: 0;
      color: #aaa;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 5px;
    }

    .grid img {
      width: 100%;
      height: auto;
      display: block;
      cursor: pointer;
      background: #222;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .lightbox img {
      max-width: 95%;
      max-height: 95%;
    }

    .counter {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      color: #aaa;
      font-size: 14px;
    }

hr {
  border: none;
  border-top: 1px solid #333;
  margin: 10px 0;
}

.message {

    
    .message {
      padding: 30px;
      text-align: center;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="header">
  <a class="back-link" href="/scouts/">← Back to Scouts</a>
<hr>

  
  <div class="breadcrumb" id="breadcrumb"></div>
<hr>
  
  <h1 id="gallery-title">Loading gallery...</h1>
<hr>

  <p id="gallery-subtitle"></p>
</div>

<div class="grid" id="gallery-grid"></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" onclick="event.stopPropagation()">
  <div class="counter" id="counter"></div>
</div>

<script>
  const DATA_URL = "/data/projects.json";

  const params = new URLSearchParams(window.location.search);
  const galleryId = params.get("gallery") || "inkwell-inn-dining-room-heroes";

  const titleEl = document.getElementById("gallery-title");
  const subtitleEl = document.getElementById("gallery-subtitle");
  const breadcrumbEl = document.getElementById("breadcrumb");
  const gridEl = document.getElementById("gallery-grid");

  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");
  const counterEl = document.getElementById("counter");

  let currentImages = [];
  let currentIndex = 0;



  
 function findGallery(projects, id) {

  for (const project of projects) {

    const found = searchFolders(
      project.folders || [],
      id,
      [project.name]
    );

    if (found) {
      return found;
    }
  }

  return null;
}

function searchFolders(folders, id, path) {

  for (const folder of folders) {

    const currentPath = [...path, folder.name];

    for (const gallery of folder.galleries || []) {

      if (gallery.id === id) {

        return {
          gallery: gallery,
          path: currentPath
        };
      }
    }

    const found = searchFolders(
      folder.folders || [],
      id,
      currentPath
    );

    if (found) {
      return found;
    }
  }

  return null;
}










  
  function updateLightbox() {
    lightboxImg.src = currentImages[currentIndex];
    counterEl.textContent = `${currentIndex + 1} / ${currentImages.length}`;
  }

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    lightbox.style.display = "flex";
  }

  function closeLightbox() {
    lightbox.style.display = "none";
    lightboxImg.src = "";
  }

  function prevImage(event) {
    event.stopPropagation();

    if (currentImages.length === 0) return;

    currentIndex--;

    if (currentIndex < 0) {
      currentIndex = currentImages.length - 1;
    }

    updateLightbox();
  }

  function nextImage(event) {
    event.stopPropagation();

    if (currentImages.length === 0) return;

    currentIndex++;

    if (currentIndex >= currentImages.length) {
      currentIndex = 0;
    }

    updateLightbox();
  }

  document.addEventListener("keydown", function(event) {
    if (lightbox.style.display !== "flex") return;

    if (event.key === "ArrowLeft") {
      prevImage(event);
    }

    if (event.key === "ArrowRight") {
      nextImage(event);
    }

    if (event.key === "Escape") {
      closeLightbox();
    }
  });

  let touchStartX = 0;
  let touchEndX = 0;

  lightbox.addEventListener("touchstart", function(event) {
    touchStartX = event.changedTouches[0].screenX;
  });

  lightbox.addEventListener("touchend", function(event) {
    touchEndX = event.changedTouches[0].screenX;

    if (touchEndX < touchStartX - 50) {
      nextImage(event);
    }

    if (touchEndX > touchStartX + 50) {
      prevImage(event);
    }
  });

  fetch(DATA_URL)
    .then(response => response.json())
    .then(data => {
      const result = findGallery(data.projects || [], galleryId);

if (!result) {
  titleEl.textContent = "Gallery not found";
  gridEl.innerHTML = '<div class="message">Check the gallery ID in the URL.</div>';
  return;
}

const gallery = result.gallery;

breadcrumbEl.innerHTML = result.path
  .map((item, index) => {
    const isLast = index === result.path.length - 1;

    if (isLast) {
      return `<span>${item}</span>`;
    }

    return `<a href="/scouts/">${item}</a>`;
  })
  .join(" / ");
      
      titleEl.textContent = gallery.title || "Untitled Gallery";
      subtitleEl.textContent = gallery.subtitle || "";

      currentImages = gallery.images || [];

      if (currentImages.length === 0) {
        gridEl.innerHTML = '<div class="message">No images added yet.</div>';
        return;
      }

      currentImages.forEach((src, index) => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = gallery.title || "Scout image";
        img.onclick = () => openLightbox(index);
        gridEl.appendChild(img);
      });
    })
    .catch(error => {
      titleEl.textContent = "Could not load gallery";
      gridEl.innerHTML = '<div class="message">There was a problem loading projects.json.</div>';
      console.error(error);
    });
</script>

</body>
</html>
