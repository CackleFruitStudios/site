<!DOCTYPE html>
<html>
<head>
  <title>Scout Folder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body { margin: 0; background: #111; color: white; font-family: Arial, sans-serif; padding: 20px; }
    a { color: inherit; text-decoration: none; }
    .back-link { display: inline-block; color: #888; font-size: 13px; margin-bottom: 12px; }
    .back-link:hover { color: #fff; }
    .top-nav { margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
    .top-nav a, .logout-btn { display: inline-block; color: #999; font-size: 14px; background: none; border: none; padding: 0; cursor: pointer; font-family: Arial, sans-serif; }
    .top-nav a:hover, .logout-btn:hover { color: #fff; text-decoration: underline; }
    .user-badge { color: #777; font-size: 13px; margin-left: auto; }
    .breadcrumb { color: #999; font-size: 13px; margin-bottom: 14px; line-height: 1.4; }
    .breadcrumb a:hover { color: #fff; text-decoration: underline; }
    h1 { font-size: 24px; margin-bottom: 20px; }
    .section-title { color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-top: 28px; margin-bottom: 10px; }
    .card { display: block; background: #1c1c1c; color: white; padding: 15px; margin-top: 10px; border-radius: 6px; border: 1px solid #333; }
    .card:hover { background: #252525; }
    .thumb { width: 100%; height: 180px; object-fit: cover; border-radius: 4px; margin-bottom: 10px; background: #222; }
    .meta { color: #aaa; font-size: 12px; margin-top: 4px; }
    .message { color: #aaa; }
    hr { border: none; border-top: 1px solid #333; margin: 10px 0; }
  </style>
</head>

<body>

<a class="back-link" href="/scouts/">← Back to Scouts</a>

<div class="top-nav">
  <a href="/scouts/">Projects</a>
  <a href="/scouts/library.html">Library</a>
  <a href="/scouts/admin.html">Admin</a>
  <button class="logout-btn" onclick="logout()">Logout</button>
  <div class="user-badge" id="user-badge"></div>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<hr>

<h1 id="folder-title">Loading folder...</h1>

<div id="content"></div>

<script>
  const SESSION_KEY = "eightyStudiosScoutUser";

  const PROJECTS_URL = "/api/project-list";
  const FOLDERS_URL = "/api/folder-list";
  const GALLERIES_URL = "/api/gallery-list";
  const PROJECT_MEMBERS_URL = "/api/project-member-list";

  const savedUser =
    sessionStorage.getItem(SESSION_KEY);

  if (!savedUser) {
    window.location.href = "/scouts/login.html";
  }

  const currentUser =
    savedUser ? JSON.parse(savedUser) : null;

  const currentUserId =
    currentUser?.id || "";

  const currentUserRole =
    currentUser?.globalRole || "";

  const params = new URLSearchParams(window.location.search);

  const projectId =
    params.get("project") || "test-project-gf";

  const folderId =
    params.get("folder") || "folder-test-location";

  const folderTitleEl =
    document.getElementById("folder-title");

  const breadcrumbEl =
    document.getElementById("breadcrumb");

  const contentEl =
    document.getElementById("content");

  const userBadgeEl =
    document.getElementById("user-badge");

  if (currentUser) {
    userBadgeEl.textContent =
      `${currentUser.name} · ${currentUserRole}`;
  }

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    window.location.href = "/scouts/login.html";
  }

  function userIsAdmin() {
    return currentUserRole === "admin";
  }

  function titleFromSlug(value) {
    return (value || "")
      .replace(/-/g, " ")
      .replace(/\b\w/g, char => char.toUpperCase());
  }

  function getProjectId(project) {
    return project.id || project.projectId || project.project_id || "";
  }

  function getProjectTitle(project) {
    return project?.title || project?.name || titleFromSlug(projectId);
  }

  function getFolderTitle(folder) {
    return folder.title || folder.name || titleFromSlug(folder.slug || folder.id);
  }

  function getGalleryProjectId(gallery) {
    return gallery.projectId || gallery.project_id || "";
  }

  function getGalleryFolderId(gallery) {
    return gallery.folderId || gallery.folder_id || "";
  }

  function getGalleryCover(gallery) {
    return gallery.cover || gallery.url || gallery.imageUrl || gallery.image_url || "";
  }

  function getImageCount(gallery) {
    const count = Number(gallery.imageCount || gallery.image_count || 0);
    return `${count} ${count === 1 ? "photo" : "photos"}`;
  }

  function getMemberProjectId(member) {
    return member.projectId || member.project_id || "";
  }

  function getMemberUserId(member) {
    return member.userId || member.user_id || "";
  }

  function userCanAccessProject(members) {
    if (userIsAdmin()) {
      return true;
    }

    return members.some(member =>
      getMemberUserId(member) === currentUserId &&
      getMemberProjectId(member) === projectId
    );
  }

  function renderAccessDenied() {
    folderTitleEl.textContent =
      "Access Denied";

    contentEl.innerHTML = `
      <p class="message">
        This user is not assigned to this project.
      </p>
    `;
  }

  function renderBreadcrumb(project, folder) {
    breadcrumbEl.innerHTML = `
      <a href="/scouts/project.html?project=${encodeURIComponent(projectId)}">
        ${getProjectTitle(project)}
      </a>
      /
      <span>${getFolderTitle(folder)}</span>
    `;
  }

  function renderGalleries(galleries) {
    if (!galleries.length) {
      return `
        <p class="message">
          No galleries found in this folder yet.
        </p>
      `;
    }

    return `
      <div class="section-title">
        Galleries
      </div>

      ${galleries.map(gallery => `
        <a
          class="card"
          href="/scouts/gallery.html?gallery=${encodeURIComponent(gallery.id)}"
        >

          ${getGalleryCover(gallery)
            ? `<img src="${getGalleryCover(gallery)}" class="thumb">`
            : ""
          }

          <div>
            ${gallery.title || gallery.name || gallery.id}
          </div>

          <div class="meta">
            ${getImageCount(gallery)}
          </div>

        </a>
      `).join("")}
    `;
  }

  Promise.all([
    fetch(PROJECTS_URL).then(response => response.json()),
    fetch(`${FOLDERS_URL}?projectId=${encodeURIComponent(projectId)}`).then(response => response.json()),
    fetch(`${GALLERIES_URL}?projectId=${encodeURIComponent(projectId)}`).then(response => response.json()),
    fetch(PROJECT_MEMBERS_URL).then(response => response.json())
  ])
    .then(([projectsData, foldersData, galleriesData, membersData]) => {
      const projects =
        projectsData.projects || [];

      const folders =
        foldersData.folders || [];

      const galleries =
        galleriesData.galleries || [];

      const members =
        membersData.members || [];

      if (!userCanAccessProject(members)) {
        renderAccessDenied();
        return;
      }

      const project =
        projects.find(item =>
          getProjectId(item) === projectId
        );

      const folder =
        folders.find(item =>
          item.id === folderId
        );

      if (!folder) {
        folderTitleEl.textContent =
          "Folder Not Found";

        contentEl.innerHTML = `
          <p class="message">
            This folder was not found in D1.
          </p>
        `;

        return;
      }

      const folderGalleries =
        galleries.filter(gallery =>
          getGalleryProjectId(gallery) === projectId &&
          getGalleryFolderId(gallery) === folderId
        );

      renderBreadcrumb(project, folder);

      folderTitleEl.textContent =
        getFolderTitle(folder);

      contentEl.innerHTML =
        renderGalleries(folderGalleries);
    })

    .catch(error => {
      console.error(error);

      folderTitleEl.textContent =
        "Could Not Load Folder";

      contentEl.innerHTML = `
        <p class="message">
          There was a problem loading D1 folder data.
        </p>
      `;
    });
</script>

</body>
</html>
