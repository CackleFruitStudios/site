<!DOCTYPE html>
<html>
<head>
  <title>Scout Folder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>

    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .back-link {
      display: inline-block;
      color: #888;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .back-link:hover {
      color: #fff;
    }

    .top-nav {
      margin-bottom: 18px;
    }

    .top-nav a {
      display: inline-block;
      color: #999;
      font-size: 14px;
      margin-right: 14px;
    }

    .top-nav a:hover {
      color: #fff;
      text-decoration: underline;
    }

    .breadcrumb {
      color: #999;
      font-size: 13px;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .breadcrumb a {
      color: inherit;
      text-decoration: none;
    }

    .breadcrumb a:hover {
      color: #fff;
      text-decoration: underline;
    }

    .breadcrumb span {
      color: #aaa;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .section-title {
      color: #aaa;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 28px;
      margin-bottom: 10px;
    }

    .card {
      display: block;
      background: #1c1c1c;
      color: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #333;
    }

    .card:hover {
      background: #252525;
    }

    .thumb {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 10px;
      background: #222;
    }

    .folder-icon {
      width: 100%;
      height: 120px;
      border-radius: 4px;
      margin-bottom: 10px;
      background: #202020;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      color: #777;
    }

    .meta {
      color: #aaa;
      font-size: 12px;
      margin-top: 4px;
    }

    .message {
      color: #aaa;
    }

    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 10px 0;
    }

  </style>
</head>

<body>

<a class="back-link" href="/scouts/">← Back to Scouts</a>

<div class="top-nav">
  <a href="/scouts/">Projects</a>
  <a href="/scouts/library.html">Library</a>
  <a href="/scouts/admin.html">Admin</a>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<hr>

<h1 id="folder-title">Loading folder...</h1>

<div id="content"></div>

<script>

  const GALLERIES_URL =
    "/data/galleries.json";

  const params =
    new URLSearchParams(window.location.search);

  const projectId =
    params.get("project") ||
    "subway-entrances";

  const currentPath =
    params.get("path") ||
    "canal-street-nw-entrance";

  const folderTitleEl =
    document.getElementById("folder-title");

  const breadcrumbEl =
    document.getElementById("breadcrumb");

  const contentEl =
    document.getElementById("content");

  function titleFromSlug(value) {

    return value
      .replace(/-/g, " ")
      .replace(/\b\w/g, char => char.toUpperCase());
  }

  function getGalleryCover(gallery) {

    return (
      gallery.cover ||
      gallery.images?.[0]?.url ||
      ""
    );
  }

  function normalizePath(path) {

    return (path || "")
      .split("/")
      .filter(Boolean)
      .join("/");
  }

  function buildBreadcrumb() {

    const parts =
      currentPath
      .split("/")
      .filter(Boolean);

    let html = `
      <a href="/scouts/project.html?project=${projectId}">
        ${titleFromSlug(projectId)}
      </a>
    `;

    parts.forEach((part, index) => {

      const partialPath =
        parts.slice(0, index + 1).join("/");

      const isLast =
        index === parts.length - 1;

      html += " / ";

      if (isLast) {

        html += `
          <span>${titleFromSlug(part)}</span>
        `;

      } else {

        html += `
          <a href="/scouts/folder.html?project=${projectId}&path=${partialPath}">
            ${titleFromSlug(part)}
          </a>
        `;
      }
    });

    breadcrumbEl.innerHTML = html;
  }

  function getImmediateChildren(galleries) {

    const folders = {};
    const directGalleries = [];

    galleries.forEach(gallery => {

      const path =
        normalizePath(gallery.path);

      if (!path.startsWith(currentPath)) {
        return;
      }

      const relative =
        path.slice(currentPath.length)
          .replace(/^\/+/, "");

      if (!relative) {

        directGalleries.push(gallery);

        return;
      }

      const parts =
        relative.split("/");

      if (parts.length === 1) {

        directGalleries.push(gallery);

        return;
      }

      const folderName =
        parts[0];

      if (!folders[folderName]) {

        folders[folderName] = {
          id: folderName,
          name: titleFromSlug(folderName),
          count: 0,
          cover: getGalleryCover(gallery)
        };
      }

      folders[folderName].count += 1;
    });

    return {
      folders:
        Object.values(folders)
          .sort((a, b) =>
            a.name.localeCompare(b.name)
          ),

      galleries:
        directGalleries
    };
  }

  function renderFolders(folders) {

    if (!folders.length) {
      return "";
    }

    return `

      <div class="section-title">
        Folders
      </div>

      ${folders.map(folder => `

        <a
          class="card"
          href="/scouts/folder.html?project=${projectId}&path=${currentPath}/${folder.id}"
        >

          ${
            folder.cover
              ? `<img src="${folder.cover}" class="thumb">`
              : `<div class="folder-icon">📁</div>`
          }

          <div>
            ${folder.name}
          </div>

          <div class="meta">
            ${folder.count} galleries or nested items
          </div>

        </a>

      `).join("")}

    `;
  }

  function renderGalleries(galleries) {

    if (!galleries.length) {
      return "";
    }

    return `

      <div class="section-title">
        Galleries
      </div>

      ${galleries.map(gallery => `

        <a
          class="card"
          href="/scouts/gallery.html?gallery=${gallery.id}"
        >

          ${
            getGalleryCover(gallery)
              ? `<img src="${getGalleryCover(gallery)}" class="thumb">`
              : ""
          }

          <div>
            ${gallery.title}
          </div>

          <div class="meta">
            ${(gallery.images || []).length} photos
          </div>

        </a>

      `).join("")}

    `;
  }

  fetch(GALLERIES_URL)

    .then(response => response.json())

    .then(data => {

      const allGalleries =
        data.galleries || [];

      const projectGalleries =
        allGalleries.filter(
          gallery =>
            gallery.projectId === projectId
        );

      const matching =
        projectGalleries.filter(gallery =>
          normalizePath(gallery.path)
            .startsWith(currentPath)
        );

      if (!matching.length) {

        folderTitleEl.textContent =
          "Folder Not Found";

        contentEl.innerHTML = `
          <p class="message">
            No galleries or folders exist here yet.
          </p>
        `;

        return;
      }

      buildBreadcrumb();

      const currentFolderName =
        currentPath
          .split("/")
          .filter(Boolean)
          .pop();

      folderTitleEl.textContent =
        titleFromSlug(currentFolderName);

      const results =
        getImmediateChildren(projectGalleries);

      contentEl.innerHTML = `

        ${renderFolders(results.folders)}

        ${renderGalleries(results.galleries)}

      `;
    })

    .catch(error => {

      console.error(error);

      folderTitleEl.textContent =
        "Could Not Load Folder";

      contentEl.innerHTML = `
        <p class="message">
          There was a problem loading galleries.json.
        </p>
      `;
    });

</script>

</body>
</html>
