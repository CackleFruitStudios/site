<!DOCTYPE html>
<html>
<head>
  <title>Scout Folder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .back-link {
      display: inline-block;
      color: #888;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .back-link:hover {
      color: #fff;
    }

    .top-nav {
      margin-bottom: 18px;
    }

    .top-nav a {
      display: inline-block;
      color: #999;
      font-size: 14px;
      margin-right: 14px;
    }

    .top-nav a:hover {
      color: #fff;
      text-decoration: underline;
    }

    .breadcrumb {
      color: #999;
      font-size: 13px;
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .breadcrumb a:hover {
      color: #fff;
      text-decoration: underline;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .section-title {
      color: #aaa;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 28px;
      margin-bottom: 10px;
    }

    .card {
      display: block;
      background: #1c1c1c;
      color: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #333;
    }

    .card:hover {
      background: #252525;
    }

    .thumb {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 10px;
      background: #222;
    }

    .meta {
      color: #aaa;
      font-size: 12px;
      margin-top: 4px;
    }

    .message {
      color: #aaa;
    }

    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<a class="back-link" href="/scouts/">← Back to Scouts</a>

<div class="top-nav">
  <a href="/scouts/">Projects</a>
  <a href="/scouts/library.html">Library</a>
  <a href="/scouts/admin.html">Admin</a>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<hr>

<h1 id="folder-title">Loading folder...</h1>

<div id="content"></div>

<script>
  const FOLDERS_URL = "/api/folder-list";
  const GALLERIES_URL = "/api/gallery-list";

  const params = new URLSearchParams(window.location.search);

  const projectId =
    params.get("project") ||
    "test-project-gf";

  const folderId =
    params.get("folder") ||
    params.get("path") ||
    "folder-test-location";

  const folderTitleEl =
    document.getElementById("folder-title");

  const breadcrumbEl =
    document.getElementById("breadcrumb");

  const contentEl =
    document.getElementById("content");

  function titleFromSlug(value) {
    return (value || "")
      .replace(/-/g, " ")
      .replace(/\b\w/g, char => char.toUpperCase());
  }

  function getFolderTitle(folder) {
    return folder.title || folder.name || titleFromSlug(folder.slug || folder.id);
  }

  function getGalleryProjectId(gallery) {
    return gallery.projectId || gallery.project_id || "";
  }

  function getGalleryFolderId(gallery) {
    return gallery.folderId || gallery.folder_id || "";
  }

  function getGalleryCover(gallery) {
    return (
      gallery.cover ||
      gallery.url ||
      gallery.imageUrl ||
      gallery.image_url ||
      ""
    );
  }

  function getImageCount(gallery) {
    return gallery.imageCount || gallery.image_count || 0;
  }

  function renderBreadcrumb(folder) {
    breadcrumbEl.innerHTML = `
      <a href="/scouts/project.html?project=${encodeURIComponent(projectId)}">
        ${titleFromSlug(projectId)}
      </a>
      /
      <span>${getFolderTitle(folder)}</span>
    `;
  }

  function renderGalleries(galleries) {
    if (!galleries.length) {
      return `
        <p class="message">
          No galleries found in this folder yet.
        </p>
      `;
    }

    return `
      <div class="section-title">
        Galleries
      </div>

      ${galleries.map(gallery => `
        <a
          class="card"
          href="/scouts/gallery.html?gallery=${encodeURIComponent(gallery.id)}"
        >
          ${
            getGalleryCover(gallery)
              ? `<img src="${getGalleryCover(gallery)}" class="thumb">`
              : ""
          }

          <div>
            ${gallery.title || gallery.name || gallery.id}
          </div>

          <div class="meta">
            ${getImageCount(gallery)} photos
          </div>
        </a>
      `).join("")}
    `;
  }

  Promise.all([
    fetch(`${FOLDERS_URL}?projectId=${encodeURIComponent(projectId)}`).then(response => response.json()),
    fetch(`${GALLERIES_URL}?projectId=${encodeURIComponent(projectId)}`).then(response => response.json())
  ])

    .then(([foldersData, galleriesData]) => {
      const folders =
        foldersData.folders || [];

      const galleries =
        galleriesData.galleries || [];

      const folder =
        folders.find(item => item.id === folderId);

      if (!folder) {
        folderTitleEl.textContent =
          "Folder Not Found";

        contentEl.innerHTML = `
          <p class="message">
            This folder was not found in D1.
          </p>
        `;

        return;
      }

      const folderGalleries =
        galleries.filter(gallery =>
          getGalleryProjectId(gallery) === projectId &&
          getGalleryFolderId(gallery) === folderId
        );

      renderBreadcrumb(folder);

      folderTitleEl.textContent =
        getFolderTitle(folder);

      contentEl.innerHTML =
        renderGalleries(folderGalleries);
    })

    .catch(error => {
      console.error(error);

      folderTitleEl.textContent =
        "Could Not Load Folder";

      contentEl.innerHTML = `
        <p class="message">
          There was a problem loading D1 folder data.
        </p>
      `;
    });
</script>

</body>
</html>
