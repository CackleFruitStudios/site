<!DOCTYPE html>
<html>
<head>
  <title>Scout Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body { margin: 0; background: #111; color: white; font-family: Arial, sans-serif; padding: 20px; }
    a { color: inherit; text-decoration: none; }
    .top-nav { margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
    .top-nav a, .logout-btn { display: inline-block; color: #999; font-size: 14px; background: none; border: none; padding: 0; cursor: pointer; font-family: Arial, sans-serif; }
    .top-nav a:hover, .logout-btn:hover { color: #fff; text-decoration: underline; }
    .user-badge { color: #777; font-size: 13px; margin-left: auto; }
    h1 { font-size: 28px; margin-bottom: 6px; }
    .subtitle { color: #888; margin-bottom: 26px; font-size: 14px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 30px; }
    .stat-card { background: #1c1c1c; border: 1px solid #333; border-radius: 6px; padding: 16px; }
    .stat-number { font-size: 28px; margin-bottom: 4px; }
    .stat-label { color: #999; font-size: 13px; }
    .section-title { color: #aaa; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-top: 28px; margin-bottom: 10px; }
    .card { display: block; background: #1c1c1c; color: white; padding: 15px; margin-top: 10px; border-radius: 6px; border: 1px solid #333; }
    .card:hover { background: #252525; }
    .meta { color: #888; font-size: 12px; margin-top: 4px; }
    .message { color: #888; }
    hr { border: none; border-top: 1px solid #333; margin: 12px 0; }
  </style>
</head>

<body>

<div class="top-nav">
  <a href="/scouts/">Projects</a>
  <a href="/scouts/scout.html">Scout Dashboard</a>
  <a href="/scouts/gallery-manager.html">Gallery Manager</a>
  <a href="/scouts/library.html">Library</a>
  <a href="/scouts/admin.html">Admin</a>
  <button class="logout-btn" onclick="logout()">Logout</button>
  <div class="user-badge" id="user-badge"></div>
</div>

<h1>Scout Dashboard</h1>

<div class="subtitle" id="subtitle">
  Assigned scout work overview
</div>

<hr>

<div class="stats">
  <div class="stat-card">
    <div class="stat-number" id="project-count">-</div>
    <div class="stat-label">Projects</div>
  </div>

  <div class="stat-card">
    <div class="stat-number" id="gallery-count">-</div>
    <div class="stat-label">Galleries</div>
  </div>

  <div class="stat-card">
    <div class="stat-number" id="image-count">-</div>
    <div class="stat-label">Images</div>
  </div>
</div>

<div class="section-title">
  Recent Galleries
</div>

<div id="gallery-list">
  <p class="message">Loading recent galleries...</p>
</div>

<script>
  const SESSION_KEY = "eightyStudiosScoutUser";

  const PROJECTS_URL = "/api/project-list";
  const GALLERIES_URL = "/api/gallery-list";
  const PROJECT_MEMBERS_URL = "/api/project-member-list";

  const savedUser =
    sessionStorage.getItem(SESSION_KEY);

  if (!savedUser) {
    window.location.href = "/scouts/login.html";
  }

  const currentUser =
    savedUser ? JSON.parse(savedUser) : null;

  const currentUserId =
    currentUser?.id || "";

  const currentUserRole =
    currentUser?.globalRole || "";

  const projectCountEl = document.getElementById("project-count");
  const galleryCountEl = document.getElementById("gallery-count");
  const imageCountEl = document.getElementById("image-count");
  const galleryListEl = document.getElementById("gallery-list");
  const userBadgeEl = document.getElementById("user-badge");
  const subtitleEl = document.getElementById("subtitle");

  if (currentUser) {
    userBadgeEl.textContent =
      `${currentUser.name} · ${currentUserRole}`;

    subtitleEl.textContent =
      currentUserRole === "admin"
        ? "Full scout work overview"
        : `Assigned scout work overview for ${currentUser.name}`;
  }

  function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    window.location.href = "/scouts/login.html";
  }

  function userIsAdmin() {
    return currentUserRole === "admin";
  }

  function getGalleryProjectId(gallery) {
    return gallery.projectId || gallery.project_id || "";
  }

  function getGalleryFolderId(gallery) {
    return gallery.folderId || gallery.folder_id || "";
  }

  function getImageCount(gallery) {
    return gallery.imageCount || gallery.image_count || 0;
  }

  function getMemberProjectId(member) {
    return member.projectId || member.project_id || "";
  }

  function getMemberUserId(member) {
    return member.userId || member.user_id || "";
  }

  function getVisibleProjectIds(members) {
    if (userIsAdmin()) {
      return null;
    }

    return members
      .filter(member => getMemberUserId(member) === currentUserId)
      .map(member => getMemberProjectId(member));
  }

  function photoLabel(count) {
    return `${count} ${count === 1 ? "photo" : "photos"}`;
  }

  function getLocationLine(gallery) {
    const parts = [
      gallery.locationName || gallery.location_name || "",
      gallery.town || "",
      gallery.state || "",
      gallery.country || ""
    ].filter(Boolean);

    return parts.join(" · ");
  }

  function sortByCreatedAtDesc(a, b) {
    return new Date(b.createdAt || b.created_at || 0) - new Date(a.createdAt || a.created_at || 0);
  }

  Promise.all([
    fetch(PROJECTS_URL).then(response => response.json()),
    fetch(GALLERIES_URL).then(response => response.json()),
    fetch(PROJECT_MEMBERS_URL).then(response => response.json())
  ])

    .then(([projectsData, galleriesData, membersData]) => {
      const projects =
        projectsData.projects || [];

      const galleries =
        galleriesData.galleries || [];

      const members =
        membersData.members || [];

      const visibleProjectIds =
        getVisibleProjectIds(members);

      const visibleProjects =
        visibleProjectIds === null
          ? projects
          : projects.filter(project =>
              visibleProjectIds.includes(project.id)
            );

      const visibleGalleries =
        visibleProjectIds === null
          ? galleries
          : galleries.filter(gallery =>
              visibleProjectIds.includes(getGalleryProjectId(gallery))
            );

      const totalImages = visibleGalleries.reduce(
        (total, gallery) => total + Number(getImageCount(gallery)),
        0
      );

      projectCountEl.textContent = visibleProjects.length;
      galleryCountEl.textContent = visibleGalleries.length;
      imageCountEl.textContent = totalImages;

      if (!visibleGalleries.length) {
        galleryListEl.innerHTML = `
          <p class="message">
            No recent galleries found.
          </p>
        `;

        return;
      }

      const recentGalleries = [...visibleGalleries]
        .sort(sortByCreatedAtDesc)
        .slice(0, 10);

      galleryListEl.innerHTML = recentGalleries.map(gallery => {
        const locationLine = getLocationLine(gallery);

        return `
          <a class="card" href="/scouts/gallery.html?gallery=${encodeURIComponent(gallery.id)}">
            <div>
              ${gallery.title || gallery.name || gallery.id}
            </div>

            ${locationLine ? `
              <div class="meta">
                ${locationLine}
              </div>
            ` : ""}

            <div class="meta">
              Project: ${getGalleryProjectId(gallery)}
            </div>

            <div class="meta">
              Folder: ${getGalleryFolderId(gallery)}
            </div>

            <div class="meta">
              ${photoLabel(getImageCount(gallery))}
            </div>
          </a>
        `;
      }).join("");
    })

    .catch(error => {
      console.error(error);

      projectCountEl.textContent = "!";
      galleryCountEl.textContent = "!";
      imageCountEl.textContent = "!";

      galleryListEl.innerHTML = `
        <p class="message">
          Could not load scout dashboard data.
        </p>
      `;
    });
</script>

</body>
</html>
