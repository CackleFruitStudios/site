<!DOCTYPE html>
<html>
<head>
  <title>Scout Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .top-nav {
      margin-bottom: 18px;
    }

    .top-nav a {
      display: inline-block;
      color: #999;
      font-size: 14px;
      margin-right: 14px;
    }

    .top-nav a:hover {
      color: #fff;
      text-decoration: underline;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #888;
      margin-bottom: 26px;
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: #1c1c1c;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 16px;
    }

    .stat-number {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .stat-label {
      color: #999;
      font-size: 13px;
    }

    .section-title {
      color: #aaa;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 28px;
      margin-bottom: 10px;
    }

    .card {
      display: block;
      background: #1c1c1c;
      color: white;
      padding: 15px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #333;
    }

    .card:hover {
      background: #252525;
    }

    .meta {
      color: #888;
      font-size: 12px;
      margin-top: 4px;
    }

    .message {
      color: #888;
    }

    hr {
      border: none;
      border-top: 1px solid #333;
      margin: 12px 0;
    }
  </style>
</head>

<body>

<div class="top-nav">
  <a href="/scouts/">Projects</a>
  <a href="/scouts/scout.html">Scout Dashboard</a>
  <a href="/scouts/library.html">Library</a>
  <a href="/scouts/admin.html">Admin</a>
</div>

<h1>Scout Dashboard</h1>

<div class="subtitle">
  Assigned scout work overview
</div>

<hr>

<div class="stats">
  <div class="stat-card">
    <div class="stat-number" id="project-count">-</div>
    <div class="stat-label">Projects</div>
  </div>

  <div class="stat-card">
    <div class="stat-number" id="gallery-count">-</div>
    <div class="stat-label">Galleries</div>
  </div>

  <div class="stat-card">
    <div class="stat-number" id="image-count">-</div>
    <div class="stat-label">Images</div>
  </div>
</div>

<div class="section-title">
  Assigned Galleries
</div>

<div id="gallery-list">
  <p class="message">Loading assigned galleries...</p>
</div>

<script>
  const PROJECTS_URL = "/api/project-list";
  const GALLERIES_URL = "/api/gallery-list";

  const projectCountEl = document.getElementById("project-count");
  const galleryCountEl = document.getElementById("gallery-count");
  const imageCountEl = document.getElementById("image-count");
  const galleryListEl = document.getElementById("gallery-list");

  function getGalleryProjectId(gallery) {
    return gallery.projectId || gallery.project_id || "";
  }

  function getImageCount(gallery) {
    return gallery.imageCount || gallery.image_count || 0;
  }

  function photoLabel(count) {
    return `${count} ${count === 1 ? "photo" : "photos"}`;
  }

  Promise.all([
    fetch(PROJECTS_URL).then(response => response.json()),
    fetch(GALLERIES_URL).then(response => response.json())
  ])

    .then(([projectsData, galleriesData]) => {
      const projects = projectsData.projects || [];
      const galleries = galleriesData.galleries || [];

      const totalImages = galleries.reduce(
        (total, gallery) => total + Number(getImageCount(gallery)),
        0
      );

      projectCountEl.textContent = projects.length;
      galleryCountEl.textContent = galleries.length;
      imageCountEl.textContent = totalImages;

      if (!galleries.length) {
        galleryListEl.innerHTML = `
          <p class="message">
            No assigned galleries found.
          </p>
        `;

        return;
      }

      galleryListEl.innerHTML = galleries.map(gallery => `
        <a
          class="card"
          href="/scouts/gallery.html?gallery=${encodeURIComponent(gallery.id)}"
        >
          <div>
            ${gallery.title || gallery.name || gallery.id}
          </div>

          <div class="meta">
            Project: ${getGalleryProjectId(gallery)}
          </div>

          <div class="meta">
            ${photoLabel(getImageCount(gallery))}
          </div>
        </a>
      `).join("");
    })

    .catch(error => {
      console.error(error);

      projectCountEl.textContent = "!";
      galleryCountEl.textContent = "!";
      imageCountEl.textContent = "!";

      galleryListEl.innerHTML = `
        <p class="message">
          Could not load scout dashboard data.
        </p>
      `;
    });
</script>

</body>
</html>
